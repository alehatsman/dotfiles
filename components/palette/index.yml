---
# Color palette component — single source of truth for the Monokai look
# across every templated config in this repo (alacritty, waybar, wofi,
# dunst, hyprlock, hyprland, tmux, zsh fzf, and the vendored vim
# colorscheme).
#
# Variant is selected by the caller via `with: { variant: ... }`.
# Default variant is monokai_dark. Per-machine override flows from
# machines/<m>/vars.yml -> the `palette_variant` global -> the `with:`
# block at the call site.
#
# IMPORTANT: call this component BEFORE any consumer in each machine
# entry — vars.load runs at expansion time and mutates the global vars
# table, so palette.* / editor.* must be in scope when subsequent
# components' templates render.
#
# This component intentionally has no file.template steps of its own —
# the vendored vim colorscheme is deployed by the nvim component (it
# needs {{ config_path }}, which is loaded later by nvim/index.yml). All
# other consumers just read palette.* / editor.* directly in their
# existing templates.

props:
  variant:
    type: string
    enum: [monokai_dark, monokai_light]
    default: monokai_dark
    description: Color palette variant. Selects vars/<variant>.yml.

steps:
  - vars.load: ./vars/{{ props.variant }}.yml

---
# Tmux — install + config.

- name: Install tmux (linux)
  pkg:
    name: tmux
    state: present
  as_user: root
  when: os == 'linux'
  tags: [tmux, install]

- name: Install tmux (macos)
  shell: brew install tmux 2>&1 | grep -v "already installed" || true
  when: os == 'darwin'
  timeout: 5m
  retries: 3
  retry_delay: 5s
  tags: [tmux, install]

- name: Clone tmux plugin manager (tpm)
  shell: |
    if [ ! -d ~/.config/tmux/plugins/tpm ]; then
      mkdir -p ~/.config/tmux/plugins
      git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
    fi
  timeout: 5m
  retries: 3
  retry_delay: 5s
  tags: [tmux, plugins]

- name: Verify tmux installation
  assert:
    command:
      cmd: which tmux
  tags: [tmux, verify]

- name: Create tmux config directory
  file.write:
    path: ~/.config/tmux
    state: directory
  tags: [tmux, config]

- name: Create tmux plugins directory
  file.write:
    path: ~/.config/tmux/plugins
    state: directory
  tags: [tmux, config]

- name: Backup existing .tmux.conf
  shell: |
    if [ -f ~/.tmux.conf ]; then
      mkdir -p ~/.dotfiles-backup
      cp ~/.tmux.conf ~/.dotfiles-backup/.tmux.conf.$(date +%Y%m%d_%H%M%S)
    fi
  tags: [tmux, backup]

- name: Deploy .tmux.conf
  file.template:
    src: ./.tmux.conf.j2
    dest: ~/.tmux.conf
  tags: [tmux, config]

- name: Verify tmux config
  assert:
    command:
      cmd: test -f ~/.tmux.conf
  tags: [tmux, verify]

- name: Verify tpm installation
  assert:
    command:
      cmd: test -d ~/.config/tmux/plugins/tpm
  tags: [tmux, verify]

---
# Tmux — install + config.

- name: Install tmux (linux)
  pkg:
    name: tmux
    state: present
  as_user: root
  when: os == 'linux'
  tags: [tmux, install]

- name: Install tmux (macos)
  pkg:
    name: tmux
    state: present
    manager: brew
  when: os == 'darwin'
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [tmux, install]

- name: Clone tmux plugin manager (tpm)
  git.clone:
    repo: https://github.com/tmux-plugins/tpm
    dest: ~/.config/tmux/plugins/tpm
    depth: 1
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [tmux, plugins]

- name: Verify tmux installation
  assert:
    command:
      cmd: which tmux
  tags: [tmux, verify]

- name: Create tmux config directory
  file.write:
    path: ~/.config/tmux
    state: directory
  tags: [tmux, config]

- name: Create tmux plugins directory
  file.write:
    path: ~/.config/tmux/plugins
    state: directory
  tags: [tmux, config]

- name: Deploy .tmux.conf
  file.template:
    src: ./.tmux.conf.j2
    dest: ~/.tmux.conf
  tags: [tmux, config]

- name: Ensure ~/.local/bin exists
  file.write:
    path: ~/.local/bin
    state: directory
  tags: [tmux, scripts]

- name: Deploy tmux-claude-jump
  file.copy:
    src: ./scripts/tmux-claude-jump.sh
    dest: ~/.local/bin/tmux-claude-jump
    mode: '0755'
  tags: [tmux, scripts]

- name: Verify tmux config
  assert:
    command:
      cmd: test -f ~/.tmux.conf
  tags: [tmux, verify]

- name: Verify tpm installation
  assert:
    command:
      cmd: test -d ~/.config/tmux/plugins/tpm
  tags: [tmux, verify]

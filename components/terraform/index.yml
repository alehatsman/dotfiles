---
# HashiCorp APT repo + terraform install.
#
# The gpg-key + sources-list dance is a textbook fit for mooncake's
# pkg.repo apt driver. Once that lands we can drop the keyring shell
# AND the manual apt-get update — pkg.repo handles both. For now:
# the keyring fetch stays shell, but the install itself is pkg.

- name: Fetch HashiCorp apt keyring
  # Replaceable with pkg.repo (apt driver) once it ships — that
  # action handles the keyring + sources.list + apt-get update
  # atomically.
  shell: |
    install -d /usr/share/keyrings
    curl -fsSL https://apt.releases.hashicorp.com/gpg \
      -o /usr/share/keyrings/hashicorp.gpg
  unless_command: test -s /usr/share/keyrings/hashicorp.gpg
  as_user: root
  when: os == 'linux'

- name: Add HashiCorp apt source
  file.write:
    path: /etc/apt/sources.list.d/hashicorp.list
    state: file
    content: |
      deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com {{ ubuntu_codename | default:"jammy" }} main
    mode: '0644'
  as_user: root
  when: os == 'linux'

- name: Install terraform (apt update + install in one)
  pkg:
    name: terraform
    state: present
    update_cache: true
  as_user: root
  when: os == 'linux'

---
# HashiCorp APT repo + terraform install via mooncake's pkg.repo apt
# driver. The action handles keyring fetch, DEB822 sources, and
# apt-get update atomically — replaces the old keyring shell + file.write
# pair.
#
# gpg_check: false matches the prior security posture (the curl-based
# shell did not pin the fingerprint either). Pin
# `gpg_key_fingerprint: 798AEC654E5C15428C8E42EEAA16FCBCA621E701`
# and flip `gpg_check: true` to upgrade key trust.

- name: Register HashiCorp apt repo
  pkg.repo:
    name: hashicorp
    state: present
    apt:
      uri: https://apt.releases.hashicorp.com
      suites: ["{{ ubuntu_codename | default:'jammy' }}"]
      components: [main]
      gpg_key_url: https://apt.releases.hashicorp.com/gpg
      gpg_check: false
  as_user: root
  when: os == 'linux'

- name: Install terraform
  pkg:
    name: terraform
    state: present
  as_user: root
  when: os == 'linux'

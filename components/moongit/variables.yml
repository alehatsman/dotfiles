---
# Component-local defaults for moongit — a private self-hosted git host.
# Override at the machine level via machines/<m>/vars.yml.
#
# Unlike dex, moongit has no published git remote yet, so the component
# builds from the existing local working tree rather than cloning. Point
# moongit_src_dir at that checkout. The build is sha-gated on the tree's
# committed HEAD — deploy committed code to the server, not WIP.
moongit_src_dir: "~/projects/moongit"

# Installed binaries (daemon + client) and their data dir. Mirrors the
# paths the repo's tasks.yml backup/restore helpers expect.
moongit_bin_path: "~/.local/bin/moongitd"
moongit_client_path: "~/.local/bin/moongit"
moongit_data_dir: "~/.local/share/moongit"
moongit_repos_dir: "~/.local/share/moongit/repos"

# Built web UI served by moongitd (MOONGIT_WEB_DIR). Lives in the source
# tree's web/dist, produced by the `vite build` step below.
moongit_web_dir: "~/projects/moongit/web/dist"

# Managed environment file consumed by the systemd unit. Re-rendered on
# every apply — keeps the unit free of host-specific absolute paths. No
# secrets live here.
moongit_env_file: "~/.config/moongit/moongit.env"

# Secret env file holding the HTTP Basic credentials that gate the web UI
# + git smart-HTTP (the /api surface keeps its Bearer-token auth). It is
# CREATED ONCE and never overwritten by apply, so hand-edited creds
# survive. Lives outside the repo, so the password is never committed.
# Empty creds (the seeded default) = basic auth disabled. To enable:
#   edit ~/.config/moongit/moongit.secret.env, then
#   systemctl --user restart moongit.service
moongit_secret_env_file: "~/.config/moongit/moongit.secret.env"

# Agent identity env file sourced by the shell (components/zsh). Holds
# MOONGIT_SERVER + MOONGIT_DATA_DIR (so the moongitd CLI used by the gwc
# worktree helper hits the live db) and a baseline MOONGIT_TOKEN minted
# under this host's name. CREATED ONCE and never clobbered — the plaintext
# token is shown only at mint time. Per-worktree tokens (gwc) override
# MOONGIT_TOKEN on cd; this is the fallback identity for the main checkout.
moongit_agent_env_file: "~/.config/moongit/agent.env"

# mooncake_src_dir (the checkout baked into the CI images' bundled mooncake)
# now lives in shared/variables.yml — both the moongit and dex CI-image steps
# use it, so it belongs at the shared layer.

# Sidecar recording the combined (moongit HEAD + mooncake HEAD) the CI images
# were last built from. The ci-images step rebuilds only when either moves, so
# the bundled mooncake tracks both the parser and the tasks.yml it must parse,
# instead of silently rotting until the quality gate fails on a YAML parse.
moongit_ci_image_sha: "~/.local/share/moongit/ci-image.sha"

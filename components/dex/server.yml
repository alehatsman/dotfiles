---
# Server-side bring-up: ensure ollama is installed and the embedding
# + chat models are pulled. Runs only on the GPU host
# (dex_role=server).
#
# Service lifecycle: ollama's own upstream installer (curl|sh below)
# creates and enables /etc/systemd/system/ollama.service as system
# user `ollama`, binding 127.0.0.1:{{ dex_remote_port }}. We
# deliberately do NOT manage a parallel dex-embed.service — a
# duplicate ollama serve crashes on $HOME and races for port 11434.
# Clients reach the endpoint via the SSH tunnel
# (components/dex/templates/dex-tunnel.service.j2).
#
# Both /v1/embeddings (used by semantic_search + the RAG leg of
# generate_code) and /v1/chat/completions (used by the generation leg
# of generate_code) are served from the same ollama instance on the
# same port, so the tunnel covers both.
#
# Why ollama and not docker+vLLM: this is what dex's own README
# uses as the canonical demo, and it eliminates docker.io + NVIDIA
# Container Toolkit from the dependency chain. WSL's CUDA driver is
# consumed directly. Throughput is fine for code-search batches.

- name: "Verify required dex server vars are set"
  # Fail fast before `ollama pull` renders as `ollama pull ''` and emits a
  # confusing error about a missing model name, or before a wait.http
  # builds a malformed URL with an empty port.
  assert:
    command:
      cmd: |
        test -n "{{ dex_embed_model }}" \
          && test -n "{{ dex_chat_model }}" \
          && test -n "{{ dex_remote_port }}" \
          && test -n "{{ dex_rerank_model }}" \
          && test -n "{{ dex_rerank_remote_port }}"
  tags: [dex, server]

- name: "Verify GPU is visible (nvidia-smi)"
  # The whole point of this entry is GPU-backed inference. Without a
  # working nvidia-smi, ollama silently falls back to CPU and the
  # wait.http probes below still pass — hiding a broken-but-running
  # server until query latency tanks in production.
  #
  # On WSL2 nvidia-smi lives at /usr/lib/wsl/lib (CUDA passthrough), which
  # interactive shells add to PATH but a non-interactive apply (agentd /
  # fleet / headless) does not — so a bare `nvidia-smi` would 127 and abort
  # an otherwise-healthy apply. Try PATH first (native GPU hosts), fall back
  # to the WSL absolute path; both failing still fails the assert correctly
  # when the GPU is genuinely absent. cmd: runs via shell, so `||` works.
  assert:
    command:
      cmd: nvidia-smi || /usr/lib/wsl/lib/nvidia-smi
  tags: [dex, server]

- name: "Install ollama (also installs + enables ollama.service)"
  # No native mooncake installer. Upstream's script handles: binary at
  # /usr/local/bin/ollama, `ollama` system user, models dir under
  # /usr/share/ollama/.ollama, and a systemd unit bound to 127.0.0.1:11434.
  shell: |
    set -euo pipefail
    curl -fsSL https://ollama.com/install.sh | sh
  unless_command: command -v ollama && systemctl is-active --quiet ollama.service
  as_user: root
  timeout: 10m
  tags: [dex, server, ollama]

# OLLAMA_NUM_PARALLEL drop-in. Upstream's installer doesn't expose env
# tuning, so we own this as a systemd drop-in rather than editing the
# unit file (which would be clobbered on `ollama update`). Restarts the
# service only when the currently-loaded Environment doesn't match —
# matters because the model pulls + wait.http probes below would
# otherwise pay an unnecessary unload/reload of every loaded model on
# every re-apply.
- name: "Ensure /etc/systemd/system/ollama.service.d exists"
  file.write:
    path: /etc/systemd/system/ollama.service.d
    state: directory
  as_user: root
  tags: [dex, server, ollama]

- name: "Deploy ollama OLLAMA_NUM_PARALLEL drop-in"
  file.template:
    src: ./templates/ollama-num-parallel.conf.j2
    dest: /etc/systemd/system/ollama.service.d/num-parallel.conf
  as_user: root
  tags: [dex, server, ollama]

# OLLAMA_KEEP_ALIVE drop-in — separate file so systemd merges it with
# num-parallel.conf without either deploy task clobbering the other.
- name: "Deploy ollama OLLAMA_KEEP_ALIVE drop-in"
  file.template:
    src: ./templates/ollama-keep-alive.conf.j2
    dest: /etc/systemd/system/ollama.service.d/keep-alive.conf
  as_user: root
  tags: [dex, server, ollama]

- name: "Reload + restart ollama.service if env drop-ins drifted"
  # One drift check for both drop-ins so we restart ollama (an
  # unload/reload of every loaded model) at most once per apply.
  #
  # Compare against the RUNNING process env (/proc/<pid>/environ), NOT
  # `systemctl show -p Environment`: after `daemon-reload` the latter
  # already reflects the new drop-in, so it would report a match and
  # skip the restart even though the live process is still on the old
  # value — leaving config and runtime divergent until the next manual
  # restart. The live env is the only source of truth for "did it take".
  shell: |
    set -euo pipefail
    systemctl daemon-reload
    pid=$(systemctl show ollama.service -p MainPID --value 2>/dev/null || echo 0)
    cur=$(tr '\0' '\n' < "/proc/$pid/environ" 2>/dev/null || true)
    drift=0
    for want in \
      "OLLAMA_NUM_PARALLEL={{ dex_ollama_num_parallel }}" \
      "OLLAMA_KEEP_ALIVE={{ dex_ollama_keep_alive }}"; do
      printf '%s\n' "$cur" | grep -qx "$want" || drift=1
    done
    [ "$drift" -eq 1 ] && systemctl restart ollama.service || true
  as_user: root
  changed_when: false
  tags: [dex, server, ollama]

- name: "Pull embedding model"
  # CLI talks to the running ollama.service (default OLLAMA_HOST is
  # 127.0.0.1:11434, which matches upstream's bind), so the pull
  # downloads into the service's model dir even though this step
  # runs as the user.
  shell: ollama pull {{ dex_embed_model }}
  unless_command: ollama list | awk '{print $1}' | grep -qx '{{ dex_embed_model }}'
  timeout: 20m
  tags: [dex, server]

- name: "Pull chat-completion model"
  # Powers the generate_code MCP tool. Same ollama service as the
  # embedder — `ollama pull` happens to also serve as the warm-up: the
  # model is paged into VRAM lazily on first request, not on pull, so
  # the readiness check below is what actually proves end-to-end
  # health. Tag-suffix names (e.g. qwen2.5-coder:7b) show up in
  # `ollama list` as `qwen2.5-coder:7b` — match exactly with grep -x.
  shell: ollama pull {{ dex_chat_model }}
  unless_command: ollama list | awk '{print $1}' | grep -qx '{{ dex_chat_model }}'
  timeout: 30m
  tags: [dex, server]

- name: "Pull ask-codebase model (optional second chat model)"
  # Used only by the ask_codebase MCP tool when dex_ask_model is
  # non-empty. Coder-tuned chat models resist the citation-only system
  # prompt and emit ungrounded "hypothetical" code; an instruction-tuned
  # model follows the contract reliably. Skipped entirely when the var
  # is empty (ask_codebase falls back to dex_chat_model).
  shell: ollama pull {{ dex_ask_model }}
  unless_command: |
    [ -z "{{ dex_ask_model }}" ] || ollama list | awk '{print $1}' | grep -qx '{{ dex_ask_model }}'
  timeout: 30m
  tags: [dex, server]

- name: "Pull summary model (smaller chat model for index-time summaries)"
  # Used by dex's per-file / per-chunk / per-package summary calls
  # during `dex index`. Outputs are 1–4 sentences, so a 7B coder
  # matches the 32B at ~4–5× the throughput and frees the 32B for
  # query-time chat / compress / draft. Skipped when empty (summaries
  # fall back to dex_chat_model). De-duplicates with the chat pull
  # via the unless_command — same model name means no second download.
  shell: ollama pull {{ dex_summary_model }}
  unless_command: |
    [ -z "{{ dex_summary_model }}" ] || ollama list | awk '{print $1}' | grep -qx '{{ dex_summary_model }}'
  timeout: 30m
  tags: [dex, server]

- name: "Pull compress model"
  # Distinct from chat/summary only if the operator has pointed compress
  # at a separate model; the unless_command de-dupes when it matches
  # dex_chat_model or dex_summary_model (no second download).
  shell: ollama pull {{ dex_compress_model }}
  unless_command: |
    [ -z "{{ dex_compress_model }}" ] || ollama list | awk '{print $1}' | grep -qx '{{ dex_compress_model }}'
  timeout: 30m
  tags: [dex, server]

- name: "Pull draft model (speculative-draft coder for generate_code)"
  # Smaller than chat by design: draft latency must fit inside Claude's
  # network/thinking RTT or the speculative pipeline is net-negative.
  # Pulled separately because it's typically the smallest model on the
  # box (1.5B/3B) — no overlap with chat/summary/compress.
  shell: ollama pull {{ dex_draft_model }}
  unless_command: |
    [ -z "{{ dex_draft_model }}" ] || ollama list | awk '{print $1}' | grep -qx '{{ dex_draft_model }}'
  timeout: 30m
  tags: [dex, server]

- name: "Wait for the embedding endpoint to become ready"
  wait.http:
    url: "http://127.0.0.1:{{ dex_remote_port }}/v1/embeddings"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"model":"{{ dex_embed_model }}","input":["ping"]}'
    status: [200]
    timeout: 10m
    poll_interval: 5s
  tags: [dex, server, verify]

- name: "Wait for the chat-completion endpoint to become ready"
  # First request after pull also triggers VRAM load — give it longer
  # than the embed probe since coder models are 5–15× the size of the
  # embedder. max_tokens=1 keeps the probe cheap once warm.
  wait.http:
    url: "http://127.0.0.1:{{ dex_remote_port }}/v1/chat/completions"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"model":"{{ dex_chat_model }}","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'
    status: [200]
    timeout: 15m
    poll_interval: 5s
  tags: [dex, server, verify]

# ─────────────────── RERANK (backend-switchable container) ────────────────
#
# Two rerank backends share the same container name (dex-rerank) and port
# (dex_rerank_remote_port). Which one runs is determined by dex_rerank_style:
#
#   cohere     → Infinity (michaelf34/infinity:latest)
#                Native /rerank endpoint, Cohere shape, suited for
#                cross-encoder models (BGE, Jina, older Qwen2 variants).
#
#   chat-vllm  → vLLM (vllm/vllm-openai:latest) with GGUF loading
#                Serves /v1/chat/completions; ChatReranker in dex uses
#                ThinkingPrefill for Qwen3-Reranker-4B (MTEB-Code 81.20,
#                ~3 GB Q4_K_M). Tokenizer = dex_rerank_model; weights from
#                dex_rerank_gguf_repo + dex_rerank_gguf_quant.
#
# Port mapping is loopback-only to mirror ollama; clients reach the
# endpoint via the second -L in dex-tunnel.service.j2.

# Docker Desktop's credsStore=desktop.exe is unreachable from inside
# WSL, breaking even anonymous pulls. We sidestep by pointing
# DOCKER_CONFIG at an empty config dir for both the pull and the run —
# Docker Hub allows anonymous pulls of public images, so no real auth
# is needed. The dir is materialized once via file.write below and
# reused; mooncake's container actions honor step.Env on the docker
# subprocess (mooncake feat/container-engine-env).

- name: "Ensure empty DOCKER_CONFIG dir exists for WSL anonymous pulls"
  file.write:
    path: "{{ env.HOME }}/.docker-anon/config.json"
    content: "{}\n"
  tags: [dex, server, rerank]

# Pull whichever image matches the configured style.

- name: "Pull Infinity rerank image (cohere style)"
  env:
    DOCKER_CONFIG: "{{ env.HOME }}/.docker-anon"
  container.image:
    name: michaelf34/infinity:latest
    runtime: docker
  unless_command: "[ '{{ dex_rerank_style }}' = 'chat-vllm' ]"
  tags: [dex, server, rerank]

- name: "Pull vLLM rerank image (chat-vllm style)"
  env:
    DOCKER_CONFIG: "{{ env.HOME }}/.docker-anon"
  container.image:
    name: vllm/vllm-openai:latest
    runtime: docker
  unless_command: "[ '{{ dex_rerank_style }}' != 'chat-vllm' ]"
  tags: [dex, server, rerank]

# Remove the existing container when either the backend type (Infinity ↔ vLLM)
# or the GPU mode has changed — the subsequent run step recreates it correctly.
# Avoids Go template {{ }} syntax entirely (docker inspect --format '{{...}}'
# conflicts with Jinja2 when '.' immediately follows '}}'); uses grep on the
# raw JSON output instead.
- name: "Remove dex-rerank container if backend type or GPU mode changed"
  shell: |
    set -euo pipefail
    docker inspect dex-rerank > /dev/null 2>&1 || exit 0
    inspect=$(docker inspect dex-rerank 2>/dev/null)
    style="{{ dex_rerank_style }}"
    # Backend type check: grep image name from raw JSON.
    is_vllm=0
    echo "$inspect" | grep -qi '"Image".*vllm' && is_vllm=1 || true
    if [ "$style" = "chat-vllm" ] && [ "$is_vllm" -eq 0 ]; then
      docker rm -f dex-rerank; exit 0
    fi
    if [ "$style" != "chat-vllm" ] && [ "$is_vllm" -eq 1 ]; then
      docker rm -f dex-rerank; exit 0
    fi
    # GPU mode check: DeviceRequests is null/[] when CPU-only.
    has_gpu=0
    echo "$inspect" | grep -qE '"Driver"\s*:\s*"nvidia"' && has_gpu=1 || true
    want="{{ dex_rerank_gpu }}"
    if [ -n "$want" ] && [ "$has_gpu" -eq 0 ]; then docker rm -f dex-rerank; fi
    if [ -z "$want" ] && [ "$has_gpu" -eq 1 ]; then docker rm -f dex-rerank; fi
  changed_when: false
  tags: [dex, server, rerank]

# ── Infinity (cohere style) ────────────────────────────────────────────────

# GPU variant — skipped when dex_rerank_gpu is empty or style is chat-vllm.
- name: "Run Infinity rerank container (GPU, cohere)"
  env:
    DOCKER_CONFIG: "{{ env.HOME }}/.docker-anon"
  container:
    name: dex-rerank
    image: michaelf34/infinity:latest
    runtime: docker
    state: running
    restart: unless-stopped
    ports:
      - "127.0.0.1:{{ dex_rerank_remote_port }}:7997"
    volumes:
      - "{{ env.HOME }}/.cache/huggingface:/app/.cache"
    env:
      HF_HOME: /app/.cache
    extra: ["--gpus", "all"]
    command:
      - v2
      - --model-id
      - "{{ dex_rerank_model }}"
      - --port
      - "7997"
      - --engine
      - torch
  unless_command: "[ -z '{{ dex_rerank_gpu }}' ] || [ '{{ dex_rerank_style }}' = 'chat-vllm' ]"
  tags: [dex, server, rerank]

# CPU variant — skipped when dex_rerank_gpu is set or style is chat-vllm.
- name: "Run Infinity rerank container (CPU, cohere)"
  env:
    DOCKER_CONFIG: "{{ env.HOME }}/.docker-anon"
  container:
    name: dex-rerank
    image: michaelf34/infinity:latest
    runtime: docker
    state: running
    restart: unless-stopped
    ports:
      - "127.0.0.1:{{ dex_rerank_remote_port }}:7997"
    volumes:
      - "{{ env.HOME }}/.cache/huggingface:/app/.cache"
    env:
      HF_HOME: /app/.cache
    command:
      - v2
      - --model-id
      - "{{ dex_rerank_model }}"
      - --port
      - "7997"
      - --engine
      - torch
  unless_command: "[ -n '{{ dex_rerank_gpu }}' ] || [ '{{ dex_rerank_style }}' = 'chat-vllm' ]"
  tags: [dex, server, rerank]

# ── vLLM (chat-vllm style) ─────────────────────────────────────────────────
#
# vLLM 0.22+ uses "repo:quant_type" syntax for remote GGUF loading.
# Two WSL2-specific bugs in 0.22.1 require a patched entrypoint:
#
#   Bug 1 — UVA unavailable in WSL2: is_pin_memory_available() returns False,
#     so is_uva_available() → False, causing UvaBuffer to raise on init.
#     Pin memory actually WORKS on RTX 5090 / WSL2 mirrored networking.
#     Fix: patch interface.py to make in_wsl() return False inside container.
#
#   Bug 2 — case mismatch: vLLM globs *-Q4_K_M.gguf (uppercase from quant
#     type spec) but Mungert's repo uses lowercase (q4_k_m.gguf). Fix: add
#     lowercase variants to the allow_patterns in weight_utils.py.
#
# Both patches are applied at container startup via sed/python before vllm
# serve is exec'd. They affect only the container's own copy of vLLM and
# survive subprocess spawning (file-level patch, not in-memory).
#
# Remove this block if/when vLLM fixes these upstream.

- name: "Run vLLM rerank container (chat-vllm)"
  env:
    DOCKER_CONFIG: "{{ env.HOME }}/.docker-anon"
  container:
    name: dex-rerank
    image: vllm/vllm-openai:latest
    runtime: docker
    state: running
    restart: unless-stopped
    ports:
      - "127.0.0.1:{{ dex_rerank_remote_port }}:7997"
    volumes:
      - "{{ env.HOME }}/.cache/huggingface:/root/.cache/huggingface"
    env:
      HF_HOME: /root/.cache/huggingface
    extra: ["--gpus", "all", "--entrypoint", "bash"]
    command:
      - "-c"
      - |
        set -e
        PY=/usr/local/lib/python3.12/dist-packages/vllm
        # Bug 1: make in_wsl() return False so pin_memory / UVA are allowed
        sed -i 's/return "microsoft" in/return False and "microsoft" in/' \
          "$PY/platforms/interface.py"
        # Bug 2: add lowercase quant-type variants to GGUF glob patterns
        python3 - <<'EOF'
        import re, pathlib
        f = pathlib.Path('/usr/local/lib/python3.12/dist-packages/vllm/model_executor/model_loader/weight_utils.py')
        t = f.read_text()
        old = '        f"*-{quant_type}.gguf",\n        f"*-{quant_type}-*.gguf",\n        f"*/*-{quant_type}.gguf",\n        f"*/*-{quant_type}-*.gguf",'
        new = '        f"*-{quant_type}.gguf", f"*-{quant_type.lower()}.gguf",\n        f"*-{quant_type}-*.gguf", f"*-{quant_type.lower()}-*.gguf",\n        f"*/*-{quant_type}.gguf", f"*/*-{quant_type.lower()}.gguf",\n        f"*/*-{quant_type}-*.gguf", f"*/*-{quant_type.lower()}-*.gguf",'
        if old in t:
            f.write_text(t.replace(old, new))
            print('weight_utils patched')
        else:
            print('weight_utils: pattern not found, skipping (may already be patched or changed upstream)')
        EOF
        exec vllm serve \
          "{{ dex_rerank_gguf_repo }}:{{ dex_rerank_gguf_quant }}" \
          --hf-config-path "{{ dex_rerank_model }}" \
          --tokenizer "{{ dex_rerank_model }}" \
          --served-model-name "{{ dex_rerank_model }}" \
          --dtype float16 \
          --port 7997 \
          --max-model-len 4096
  unless_command: "[ '{{ dex_rerank_style }}' != 'chat-vllm' ]"
  tags: [dex, server, rerank]

- name: "Wait for the rerank endpoint to become ready"
  # Both Infinity (/health) and vLLM (/health) respond on this path.
  # First start may trigger a HuggingFace download — allow 10 min.
  wait.http:
    url: "http://127.0.0.1:{{ dex_rerank_remote_port }}/health"
    status: [200]
    timeout: 10m
    poll_interval: 5s
  tags: [dex, server, rerank, verify]

---
# Component-local defaults. Override at the machine level via vars.yml.
# Cross-machine defaults live in shared/variables.yml.

# The component clones dex_src_url into dex_src_dir and builds.
# Path lives under ~/.local/share/ to make "this is mooncake's checkout —
# don't hack here" obvious. Keep dev checkouts in ~/projects/<repo>/ so
# mooncake's git.clone update:true (which refuses divergent local commits)
# trips on accidents, not on intentional dev work.
dex_src_url: "git@github.com:alehatsman/dex.git"
# Both paths are user-relative. Mooncake's git.clone dest: expands ~ via
# PathUtil; shell heredocs reference the vars UNQUOTED (`cd {{ var }}`,
# not `cd "{{ var }}"`) so bash also expands the tilde at run time —
# `cd "~/..."` inside double-quotes fails. Install runs as the user
# (no as_user: root) so ~ resolves to the same home consistently.
dex_src_dir: "~/.local/share/dex-src"
dex_bin_path: "~/.local/bin/dex"

# Sidecar recording the combined (dex HEAD + mooncake HEAD) the dex-ci:latest
# image was last built from. The ci-image step (server role) rebuilds only
# when either moves, so dex-ci's bundled mooncake tracks the tasks.yml it must
# parse and doesn't silently rot — the dex analog of moongit#193 (see dex#27).
# dex-ci is FROM moongit-ci-dev, so the dex component is imported AFTER moongit
# in the machine index to guarantee that base exists first.
dex_ci_image_sha: "~/.local/share/dex-ci-image.sha"

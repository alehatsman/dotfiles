---
# Component-local defaults for the mooncake CI image. mooncake itself isn't
# otherwise provisioned by dotfiles (the host binary is built elsewhere); this
# component exists solely to keep mooncake-ci:latest — the container moongit
# runs mooncake's server-side CI in — current, mirroring moongit#193 / dex#27.
# mooncake_src_dir lives in shared/variables.yml (shared by all CI-image steps).

# Sidecar recording (mooncake HEAD + the moongit-ci-dev base image id) the
# mooncake-ci:latest image was last built from. The ci-image step rebuilds only
# when either changes, so mooncake-ci tracks both its own ci/Dockerfile and its
# base (which carries the bundled mooncake) instead of silently rotting until
# the quality gate fails. The base id is used (not a HEAD) because mooncake-ci
# is a thin derive-and-add on moongit-ci-dev — its freshness is the base's.
mooncake_ci_image_sha: "~/.local/share/mooncake-ci-image.sha"

---
# spotifyd — headless Spotify Connect daemon. Lightest possible "Spotify
# client": ~10–20 MB RAM, no UI. Pair from the phone/desktop Spotify app
# via Spotify Connect (zeroconf discovery on LAN).
#
# Requires Spotify Premium (librespot limitation).
#
# Re-apply just this slice with:
#   ./scripts/run.sh --machine x1 --tags spotifyd

- name: Ensure spotifyd config directory exists
  file.write:
    path: ~/.config/spotifyd
    state: directory
  tags: [spotifyd, config]

- name: Deploy spotifyd config
  file.template:
    src: ./templates/spotifyd.conf.j2
    dest: ~/.config/spotifyd/spotifyd.conf
  tags: [spotifyd, config]

- name: Enable and start spotifyd user service
  # The AUR spotifyd package ships /usr/lib/systemd/user/spotifyd.service,
  # so we just enable it. Restart picks up any config changes.
  shell: |
    systemctl --user daemon-reload
    systemctl --user enable --now spotifyd.service
    systemctl --user restart spotifyd.service
  tags: [spotifyd, service]

---
# Atuin — searchable shell history with optional cross-machine sync.
# Bound to Ctrl-R only; Up arrow keeps zsh-history-substring-search.
# Init is wired in components/zsh/templates/.zshrc.j2 (atuin block).
#
# After install, run once to backfill old history into atuin's db:
#   atuin import auto
# Then optionally enable sync:
#   atuin register -u <name> -e <email>   # or `atuin login`

- name: Install atuin (arch)
  pkg:
    name: atuin
    state: present
  as_user: root
  when: pacman_available
  tags: [atuin, install]

- name: Install atuin (ubuntu/debian via cargo)
  # atuin isn't packaged in Ubuntu's apt repos (not in universe as of
  # 24.04). Build from source via cargo instead — rust is already
  # provisioned by components/languages. Installs to ~/.cargo/bin/atuin,
  # which the zsh config adds to PATH.
  #
  # `rustup update stable` first: atuin tracks recent rustc (18.16.1
  # needs ≥1.95). rustup updates are fast no-ops once current.
  shell: |
    export PATH="$HOME/.cargo/bin:$PATH"
    rustup update stable
    cargo install atuin --locked
  unless_command: test -x "$HOME/.cargo/bin/atuin"
  when: apt_available
  timeout: 20m
  tags: [atuin, install]

- name: Install atuin (macos)
  pkg:
    name: atuin
    state: present
    manager: brew
  when: os == 'darwin'
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [atuin, install]

- name: Verify atuin installation
  # PATH prepend covers the cargo install path (~/.cargo/bin/atuin)
  # since mooncake's non-interactive bash doesn't source .bashrc.
  assert:
    command:
      cmd: 'PATH="$HOME/.cargo/bin:$PATH" command -v atuin'
  tags: [atuin, verify]

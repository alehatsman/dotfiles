---
- vars.load: ./variables.yml

- name: Make sure undo dir is present
  file.write:
    path: "{{ config_path }}/undodir"
    state: directory
  tags: [nvim, setup]

- name: Create directory after
  file.write:
    path: "{{ config_path }}/after"
    state: directory
  tags: [nvim, setup]

- name: Create directory ftplugin
  file.write:
    path: "{{ config_path }}/ftplugin"
    state: directory
  tags: [nvim, setup]

- name: Create directory lua
  file.write:
    path: "{{ config_path }}/lua"
    state: directory
  tags: [nvim, setup]

- name: Create directory lua/claude_nvim
  file.write:
    path: "{{ config_path }}/lua/claude_nvim"
    state: directory
  tags: [nvim, setup]

- name: Create directory colors
  file.write:
    path: "{{ config_path }}/colors"
    state: directory
  tags: [nvim, setup]

# Vendored Monokai colorscheme — generated from the palette component so
# the editor's syntax colors stay in lockstep with the rest of the system
# (alacritty/waybar/wofi/dunst/tmux/zsh fzf). Edit components/palette/vars/
# to change colors; never edit the generated file under ~/.config/nvim/colors/.
- name: Deploy vendored Monokai colorscheme (palette-driven)
  file.template:
    src: ../palette/templates/monokai.vim.j2
    dest: "{{ config_path }}/colors/monokai.vim"
  tags: [nvim, colorscheme, palette]

- name: Deploy config file {{ item.Path }}
  file.template:
    src: "{{ item.Src }}"
    dest: "{{ config_path }}/{{ item.Path }}"
  for_each_file: "./templates"
  when: not item.IsDir
  tags: [nvim, config]

- import: ./win32yank.yml
  when: use_win32yank
  tags: [nvim, win32yank]

# tree-sitter CLI is required by nvim-treesitter to compile parsers
# on first install. Cargo install pulls in libclang via rquickjs-sys,
# so use the official prebuilt binary instead — single static file,
# no toolchain dependencies. Linux: GitHub release; macOS: brew.
- name: Install tree-sitter CLI (linux release binary)
  shell: |
    set -e
    mkdir -p "$HOME/.local/bin"
    tmp=$(mktemp)
    curl -fsSL -o "$tmp.gz" https://github.com/tree-sitter/tree-sitter/releases/download/v0.26.8/tree-sitter-linux-x64.gz
    gunzip -c "$tmp.gz" > "$HOME/.local/bin/tree-sitter"
    chmod +x "$HOME/.local/bin/tree-sitter"
    rm -f "$tmp" "$tmp.gz"
  unless_command: command -v tree-sitter >/dev/null 2>&1 || test -x "$HOME/.local/bin/tree-sitter"
  when: os == 'linux'
  tags: [nvim, treesitter]

- name: Install tree-sitter CLI (brew)
  pkg:
    name: tree-sitter
  when: os == 'darwin'
  tags: [nvim, treesitter]

- name: Make sure plugins are installed
  shell: |
    export PATH="$HOME/.local/bin:$PATH"
    nvim --headless "+Lazy! sync" +qa
  timeout: 15m
  retry:
    attempts: 2
    delay: 10s
  tags: [nvim, plugins]

# vim-go is lazy-loaded on Go filetype, so it prompts to run :GoInstallBinaries
# the first time a .go file is opened. Do it here so users never see the prompt.
# Opening a stub .go file triggers vim-go via FileType; :GoInstallBinaries is
# idempotent (skips binaries already present).
- name: Pre-install vim-go binaries (gopls, goimports, ...)
  shell: |
    set -e
    command -v go >/dev/null 2>&1 || { echo "go not installed, skipping"; exit 0; }
    tmp=$(mktemp --suffix=.go)
    echo 'package main' > "$tmp"
    nvim --headless "$tmp" "+GoInstallBinaries" +qa
    rm -f "$tmp"
  timeout: 15m
  tags: [nvim, golang]

- import: ./copilot.yml
  tags: [nvim, copilot]

- name: Verify nvim installation
  assert:
    command:
      cmd: which nvim
  tags: [nvim, verify]

- name: Verify nvim config
  assert:
    command:
      cmd: test -f ~/.config/nvim/init.lua
  tags: [nvim, verify]

- name: Verify lazy.nvim installation
  assert:
    command:
      cmd: test -d ~/.local/share/nvim/lazy/lazy.nvim
  tags: [nvim, verify]

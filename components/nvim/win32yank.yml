---
- name: Ensure ~/bin exists
  file.write:
    path: ~/bin
    state: directory

- name: Download win32yank zip
  file.download:
    url: https://github.com/equalsraf/win32yank/releases/download/v0.0.4/win32yank-x64.zip
    dest: /tmp/win32yank.zip

# The zip ships a LICENSE alongside win32yank.exe and zip mode bits are
# unreliable for the executable bit, so we extract just the binary and
# chmod it ourselves. `creates:` keeps this idempotent.
- name: Install win32yank.exe to ~/bin
  shell: |
    set -euo pipefail
    unzip -p /tmp/win32yank.zip win32yank.exe > ~/bin/win32yank.exe
    chmod +x ~/bin/win32yank.exe
  creates: ~/bin/win32yank.exe

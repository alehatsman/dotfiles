---
- name: "Install claude if not present"
  # Upstream install script uses bashisms; pipe into bash explicitly
  # because /bin/sh is dash on Ubuntu.
  shell: curl -sSL https://claude.ai/install.sh | bash
  unless_command: which claude
  tags: [claude]

- name: "Make sure claude config directory exists"
  file.write:
    path: "~/.claude"
    state: directory
  tags: [claude]

- name: "Deploy claude settings"
  file.copy:
    src: "./settings.json"
    dest: "~/.claude/settings.json"
  tags: [claude]

- name: "Deploy claude system prompt"
  # Source defaults to ./CLAUDE.md (shared trooper prompt); per-machine
  # vars override claude_system_prompt_src to ship a host-specific prompt.
  # Path resolves relative to this component dir.
  file.copy:
    src: "{{ claude_system_prompt_src }}"
    dest: "~/.claude/CLAUDE.md"
  tags: [claude]

- name: "Install claude-autoapprove"
  shell: |
    set -euo pipefail
    tmpdir=$(mktemp -d)
    trap 'rm -rf "$tmpdir"' EXIT
    git clone https://github.com/alehatsman/claude-autoapprove "$tmpdir/claude-autoapprove"
    cd "$tmpdir/claude-autoapprove"
    go build -o claude-autoapprove ./cmd/claude-autoapprove
    sudo mv claude-autoapprove /usr/local/bin/claude-autoapprove
  creates: /usr/local/bin/claude-autoapprove
  tags: [claude]

- name: "Register moongit MCP server"
  shell: claude mcp list 2>/dev/null | grep -q '^moongit' || claude mcp add --scope user -e MOONGIT_TOKEN="$MOONGIT_TOKEN" -- moongit mgit mcp
  tags: [claude]

- name: "Register mooncake MCP server"
  shell: claude mcp list 2>/dev/null | grep -q '^mooncake' || claude mcp add --scope user -- mooncake mooncake mcp
  tags: [claude]

- name: "Add and update claude-plugins-official marketplace"
  shell: |
    claude plugin marketplace list 2>/dev/null | grep -q 'claude-plugins-official' \
      || claude plugin marketplace add anthropics/claude-plugins-official
    claude plugin marketplace update claude-plugins-official
  tags: [claude]

- name: "Install gopls LSP plugin"
  shell: claude plugins install gopls-lsp@claude-plugins-official --scope user
  unless_command: claude plugins list 2>/dev/null | grep -q 'gopls-lsp@claude-plugins-official'
  tags: [claude]

- name: "Install lua LSP plugin"
  shell: claude plugins install lua-lsp@claude-plugins-official --scope user
  unless_command: claude plugins list 2>/dev/null | grep -q 'lua-lsp@claude-plugins-official'
  tags: [claude]

- name: "Install typescript LSP plugin"
  shell: claude plugins install typescript-lsp@claude-plugins-official --scope user
  unless_command: claude plugins list 2>/dev/null | grep -q 'typescript-lsp@claude-plugins-official'
  tags: [claude]

---
- name: Install zsh
  pkg:
    name: zsh
    state: present
  as_user: root
  when: os == "linux"
  tags: [zsh, install]

- name: Install zsh (macos)
  pkg:
    name: zsh
    state: present
    manager: brew
  when: os == "darwin"
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [zsh, install]

- name: Make sure zsh config directory is present
  file.write:
    path: ~/.config/zsh
    state: directory
  tags: [zsh, config]

- vars.load: ./vars/ubuntu_vars.yml
  when: os == 'linux'

- vars.load: ./vars/macos_{{arch}}.yml
  when: os == "darwin"

- name: Deploy .zshrc
  file.template:
    src: ./templates/.zshrc.j2
    dest: ~/.zshrc
  tags: [zsh, config]

- name: Deploy .ignore
  file.template:
    src: ./templates/.ignore.j2
    dest: ~/.ignore
  tags: [zsh, config]

- name: Clone zplug
  git.clone:
    repo: https://github.com/zplug/zplug.git
    dest: ~/.zplug
    depth: 1
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [zsh, plugins]

- name: Clone oh-my-zsh
  git.clone:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: ~/.zplug/repos/ohmyzsh/ohmyzsh
    depth: 1
  timeout: 5m
  retry:
    attempts: 3
    delay: 5s
  tags: [zsh, plugins]

- name: Set zsh as default shell
  os.user:
    name: "{{ username }}"
    shell: "{{ zsh_shell_path }}"
  as_user: root
  tags: [zsh, shell]

- name: Verify zsh installation
  assert:
    command:
      cmd: which zsh
  tags: [zsh, verify]

- name: Verify zsh config
  assert:
    command:
      cmd: test -f ~/.zshrc
  tags: [zsh, verify]

- name: Verify zplug installation
  assert:
    command:
      cmd: test -d ~/.zplug
  tags: [zsh, verify]

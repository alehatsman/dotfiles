---
# Server-side bring-up: ensure ollama is installed and the embedding
# + chat models are pulled. Runs only on the GPU host
# (mcsearch_role=server).
#
# Service lifecycle: ollama's own upstream installer (curl|sh below)
# creates and enables /etc/systemd/system/ollama.service as system
# user `ollama`, binding 127.0.0.1:{{ mcsearch_remote_port }}. We
# deliberately do NOT manage a parallel mcsearch-embed.service — a
# duplicate ollama serve crashes on $HOME and races for port 11434.
# Clients reach the endpoint via the SSH tunnel
# (components/mcsearch/templates/mcsearch-tunnel.service.j2).
#
# Both /v1/embeddings (used by semantic_search + the RAG leg of
# generate_code) and /v1/chat/completions (used by the generation leg
# of generate_code) are served from the same ollama instance on the
# same port, so the tunnel covers both.
#
# Why ollama and not docker+vLLM: this is what mcsearch's own README
# uses as the canonical demo, and it eliminates docker.io + NVIDIA
# Container Toolkit from the dependency chain. WSL's CUDA driver is
# consumed directly. Throughput is fine for code-search batches.

- name: "Install ollama (also installs + enables ollama.service)"
  # No native mooncake installer. Upstream's script handles: binary at
  # /usr/local/bin/ollama, `ollama` system user, models dir under
  # /usr/share/ollama/.ollama, and a systemd unit bound to 127.0.0.1:11434.
  shell: |
    curl -fsSL https://ollama.com/install.sh | sh
  unless_command: command -v ollama && systemctl is-active --quiet ollama.service
  as_user: root
  timeout: 10m
  tags: [mcsearch, server, ollama]

- name: "Pull embedding model"
  # CLI talks to the running ollama.service (default OLLAMA_HOST is
  # 127.0.0.1:11434, which matches upstream's bind), so the pull
  # downloads into the service's model dir even though this step
  # runs as the user.
  shell: ollama pull {{ mcsearch_embed_model }}
  unless_command: ollama list | awk '{print $1}' | grep -qx '{{ mcsearch_embed_model }}'
  timeout: 20m
  tags: [mcsearch, server]

- name: "Pull chat-completion model"
  # Powers the generate_code MCP tool. Same ollama service as the
  # embedder — `ollama pull` happens to also serve as the warm-up: the
  # model is paged into VRAM lazily on first request, not on pull, so
  # the readiness check below is what actually proves end-to-end
  # health. Tag-suffix names (e.g. qwen2.5-coder:7b) show up in
  # `ollama list` as `qwen2.5-coder:7b` — match exactly with grep -x.
  shell: ollama pull {{ mcsearch_chat_model }}
  unless_command: ollama list | awk '{print $1}' | grep -qx '{{ mcsearch_chat_model }}'
  timeout: 30m
  tags: [mcsearch, server]

- name: "Wait for the embedding endpoint to become ready"
  wait.http:
    url: "http://127.0.0.1:{{ mcsearch_remote_port }}/v1/embeddings"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"model":"{{ mcsearch_embed_model }}","input":["ping"]}'
    status: [200]
    timeout: 10m
    poll_interval: 5s
  tags: [mcsearch, server, verify]

- name: "Wait for the chat-completion endpoint to become ready"
  # First request after pull also triggers VRAM load — give it longer
  # than the embed probe since coder models are 5–15× the size of the
  # embedder. max_tokens=1 keeps the probe cheap once warm.
  wait.http:
    url: "http://127.0.0.1:{{ mcsearch_remote_port }}/v1/chat/completions"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"model":"{{ mcsearch_chat_model }}","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'
    status: [200]
    timeout: 15m
    poll_interval: 5s
  tags: [mcsearch, server, verify]

# ───────────────── RERANK (Cohere-shape /rerank server) ───────────────────
#
# ollama doesn't serve cross-encoders, so we run a dedicated rerank
# container alongside it on the GPU host. Infinity is the lightest
# Cohere-compatible option — single docker image, native /rerank
# endpoint, supports BGE/Qwen/Jina cross-encoders out of the box.
#
# Port mapping is loopback-only to mirror ollama; clients reach the
# endpoint via the second -L in mcsearch-tunnel.service.j2.

- name: "Run Infinity rerank container"
  # Docker Desktop's credsStore=desktop.exe is unreachable from inside
  # WSL, breaking even anonymous pulls. We sidestep with a per-invocation
  # empty config dir — Docker Hub allows anonymous pulls of public
  # images, so no real auth is needed.
  shell: |
    set -e
    cfg=$(mktemp -d)
    trap 'rm -rf "$cfg"' EXIT
    echo '{}' > "$cfg/config.json"
    docker --config "$cfg" pull michaelf34/infinity:latest
    docker --config "$cfg" run -d \
      --name mcsearch-rerank \
      --gpus all \
      --restart unless-stopped \
      -p 127.0.0.1:{{ mcsearch_rerank_remote_port }}:7997 \
      -v "$HOME/.cache/huggingface:/app/.cache" \
      -e HF_HOME=/app/.cache \
      michaelf34/infinity:latest \
      v2 --model-id {{ mcsearch_rerank_model }} --port 7997 --engine torch
  unless_command: |
    [ -n "$(docker ps -q --filter name=^/mcsearch-rerank$)" ]
  tags: [mcsearch, server, rerank]

- name: "Wait for the rerank endpoint to become ready"
  # First request triggers model download (~1.2 GB for bge-reranker-v2-m3)
  # plus VRAM load — give it 10 min on a cold start. /health is the
  # cheapest readiness probe; /rerank itself would also warm the model.
  wait.http:
    url: "http://127.0.0.1:{{ mcsearch_rerank_remote_port }}/health"
    status: [200]
    timeout: 10m
    poll_interval: 5s
  tags: [mcsearch, server, rerank, verify]

---
# Server-side bring-up: ensure ollama is installed and the embedding
# model is pulled. Runs only on the GPU host (mcsearch_role=server).
#
# Service lifecycle: ollama's own upstream installer (curl|sh below)
# creates and enables /etc/systemd/system/ollama.service as system
# user `ollama`, binding 127.0.0.1:{{ mcsearch_remote_port }}. We
# deliberately do NOT manage a parallel mcsearch-embed.service — a
# duplicate ollama serve crashes on $HOME and races for port 11434.
# Clients reach the endpoint via the SSH tunnel
# (components/mcsearch/templates/mcsearch-tunnel.service.j2).
#
# Why ollama and not docker+vLLM: this is what mcsearch's own README
# uses as the canonical demo, and it eliminates docker.io + NVIDIA
# Container Toolkit from the dependency chain. WSL's CUDA driver is
# consumed directly. Throughput is fine for code-search batches.

- name: "Install ollama (also installs + enables ollama.service)"
  # No native mooncake installer. Upstream's script handles: binary at
  # /usr/local/bin/ollama, `ollama` system user, models dir under
  # /usr/share/ollama/.ollama, and a systemd unit bound to 127.0.0.1:11434.
  shell: |
    curl -fsSL https://ollama.com/install.sh | sh
  unless_command: command -v ollama && systemctl is-active --quiet ollama.service
  as_user: root
  timeout: 10m
  tags: [mcsearch, server, ollama]

- name: "Pull embedding model"
  # CLI talks to the running ollama.service (default OLLAMA_HOST is
  # 127.0.0.1:11434, which matches upstream's bind), so the pull
  # downloads into the service's model dir even though this step
  # runs as the user.
  shell: ollama pull {{ mcsearch_embed_model }}
  unless_command: ollama list | awk '{print $1}' | grep -qx '{{ mcsearch_embed_model }}'
  timeout: 20m
  tags: [mcsearch, server]

- name: "Wait for the embedding endpoint to become ready"
  wait.http:
    url: "http://127.0.0.1:{{ mcsearch_remote_port }}/v1/embeddings"
    method: POST
    headers:
      Content-Type: application/json
    body: '{"model":"{{ mcsearch_embed_model }}","input":["ping"]}'
    status: [200]
    timeout: 10m
    poll_interval: 5s
  tags: [mcsearch, server, verify]

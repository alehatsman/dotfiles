---
# Component-local defaults. Override at the machine level via vars.yml.
# Cross-machine defaults live in shared/variables.yml.

# The component clones mcsearch_src_url into mcsearch_src_dir and builds.
# Path lives under ~/.local/share/ to make "this is mooncake's checkout —
# don't hack here" obvious. Keep dev checkouts in ~/projects/<repo>/ so
# mooncake's git.clone update:true (which refuses divergent local commits)
# trips on accidents, not on intentional dev work.
mcsearch_src_url: "git@github.com:alehatsman/mcsearch.git"
# Fully-resolved path (not "~/...") — shell heredocs quote the var and
# bash won't expand tilde inside quotes; the resulting `cd "~/..."` fails.
mcsearch_src_dir: "{{ user_home }}/.local/share/mcsearch-src"
mcsearch_bin_path: "/usr/local/bin/mcsearch"

# Server-side container image tag for the embedding engine. The vLLM
# image bundles its own CUDA runtime; bumping this gets you newer
# model support without changing the host driver.
mcsearch_vllm_image: "vllm/vllm-openai:latest"
mcsearch_tei_image:  "ghcr.io/huggingface/text-embeddings-inference:1.9"

# Embedding-server tuning knobs (only used when mcsearch_role=server).
# Max sequence length the engine will accept per chunk. Embeddings models
# generally truncate beyond this; setting it lower saves a bit of VRAM.
mcsearch_max_model_len: "4096"

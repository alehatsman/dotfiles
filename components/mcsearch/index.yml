---
# mcsearch — local semantic-search MCP helper for Claude Code.
#
# Role:
#   mcsearch_role=client  install the Go binary + register MCP + SSH tunnel
#   mcsearch_role=server  additionally bring up the embedding service in WSL
#
# Default is client (see shared/variables.yml); main_pc overrides to server.
# Machines that don't want mcsearch at all simply omit the import line.
# See components/mcsearch/server.yml for server-side steps.

- vars.load: ./variables.yml

# ───────────────── CLIENT (and server — server is a superset) ──────────────

- name: "Ensure Go toolchain is installed (for building mcsearch)"
  # Expected to be provided by components/languages — this is just a
  # fail-fast guard so the build step doesn't error out cryptically.
  assert:
    command:
      cmd: command -v go
  tags: [mcsearch, build]

- name: "Ensure ~/.local/bin exists"
  file.write:
    path: ~/.local/bin
    state: directory
  tags: [mcsearch, build]

- name: "Clone or update mcsearch source"
  # update:true is safe here because mcsearch_src_dir is under
  # ~/.local/share/ — kept distinct from any dev checkout in ~/projects/.
  # If somehow this checkout diverges, mooncake refuses with a clear error
  # instead of silently trampling work.
  git.clone:
    repo: "{{ mcsearch_src_url }}"
    dest: "{{ mcsearch_src_dir }}"
    update: true
  tags: [mcsearch, build]

# Both build + install are skipped when the installed binary's sidecar SHA
# matches the source HEAD — otherwise every apply rebuilds and re-installs
# and plan-mode reports a change every run. Force rebuild via:
#   rm /usr/local/bin/mcsearch{,.sha} && ./scripts/run.sh -m <m> --tags mcsearch

- name: "Build mcsearch binary"
  # {{ mcsearch_src_dir }} is unquoted on purpose — see variables.yml.
  shell: |
    cd {{ mcsearch_src_dir }}
    go build -trimpath -ldflags "-s -w" -o ./mcsearch ./cmd/mcsearch
  unless_command: |
    test -x {{ mcsearch_bin_path }} && \
      [ "$(cat {{ mcsearch_bin_path }}.sha 2>/dev/null)" = "$(git -C {{ mcsearch_src_dir }} rev-parse HEAD 2>/dev/null)" ]
  tags: [mcsearch, build]

- name: "Install mcsearch to {{ mcsearch_bin_path }}"
  # Runs as the user (no as_user: root) so ~ resolves to the same home
  # the build step used.
  shell: |
    install -m 0755 {{ mcsearch_src_dir }}/mcsearch {{ mcsearch_bin_path }}
    git -C {{ mcsearch_src_dir }} rev-parse HEAD > {{ mcsearch_bin_path }}.sha
    chmod 0644 {{ mcsearch_bin_path }}.sha
  unless_command: |
    test -x {{ mcsearch_bin_path }} && \
      [ "$(cat {{ mcsearch_bin_path }}.sha 2>/dev/null)" = "$(git -C {{ mcsearch_src_dir }} rev-parse HEAD 2>/dev/null)" ]
  tags: [mcsearch, build]

- name: "Register mcsearch with Claude Code (user scope)"
  # remove-then-add keeps the command/args in lockstep with this template
  # so future arg changes propagate cleanly. Env vars are passed via
  # `claude mcp add -e` rather than relying on shell defaults — the
  # ollama-served model names + non-standard port all differ from the
  # mcsearch binary's compiled-in defaults, so leaving them implicit
  # would silently 4xx against both endpoints. EMBED_* drives both
  # semantic_search and the RAG leg of generate_code; CHAT_* drives the
  # generation leg of generate_code.
  shell: |
    claude mcp remove mcsearch --scope user 2>/dev/null || true
    # Build arg list in a bash array so optional features (compress, draft)
    # can be conditionally appended without multi-line continuation gymnastics.
    args=(
      -e MCSEARCH_EMBED_URL=http://127.0.0.1:{{ mcsearch_local_port }}
      -e MCSEARCH_EMBED_MODEL={{ mcsearch_embed_model }}
      -e MCSEARCH_CHAT_URL=http://127.0.0.1:{{ mcsearch_local_port }}
      -e MCSEARCH_CHAT_MODEL={{ mcsearch_chat_model }}
      -e MCSEARCH_ASK_MODEL={{ mcsearch_ask_model }}
      -e MCSEARCH_RERANK_URL=http://127.0.0.1:{{ mcsearch_rerank_local_port }}
      -e MCSEARCH_RERANK_STYLE={{ mcsearch_rerank_style }}
      -e MCSEARCH_RERANK_MODEL={{ mcsearch_rerank_model }}
      -e MCSEARCH_RERANK_POOL={{ mcsearch_rerank_pool }}
      -e MCSEARCH_RERANK_CONCURRENCY={{ mcsearch_rerank_concurrency }}
    )
    # Context compression: distils retrieved chunks before injecting into
    # Claude's context window (4–5× token savings). Disabled when port is "".
    [[ -n '{{ mcsearch_compress_port }}' ]] && args+=(
      -e MCSEARCH_COMPRESS_URL=http://127.0.0.1:{{ mcsearch_compress_port }}
      -e MCSEARCH_COMPRESS_MODEL={{ mcsearch_compress_model }}
    )
    # Speculative local draft: pre-generates code so Claude refines rather
    # than writes from scratch (3–10× generation token savings). Disabled when port is "".
    [[ -n '{{ mcsearch_draft_port }}' ]] && args+=(
      -e MCSEARCH_DRAFT_URL=http://127.0.0.1:{{ mcsearch_draft_port }}
      -e MCSEARCH_DRAFT_MODEL={{ mcsearch_draft_model }}
    )
    claude mcp add --scope user mcsearch "${args[@]}" -- {{ mcsearch_bin_path }} mcp
  tags: [mcsearch, claude]

- name: "Verify mcsearch is on $PATH"
  assert:
    command:
      cmd: which mcsearch
  tags: [mcsearch, verify]

- name: "Verify mcsearch is registered with Claude Code"
  assert:
    command:
      cmd: "claude mcp list | grep -q '^mcsearch: '"
  tags: [mcsearch, verify]

# ───────────────── CLIENT-ONLY TUNNEL (Linux + macOS) ──────────────────────
#
# Server hosts skip the tunnel — they reach the embedding endpoint over
# loopback (mcsearch is fine pointing at the same 127.0.0.1:8082 that the
# server publishes).

- name: "Ensure {{ mcsearch_remote_host }} SSH alias is in ~/.ssh/config"
  # The tunnel template (and the ssh binary launched by launchd/systemd)
  # resolves `mcsearch_remote_host` as a hostname alias. Without this Host
  # block the tunnel fails with "nodename nor servname provided". The step
  # is idempotent — it exits early if the block is already present.
  shell: |
    config="$HOME/.ssh/config"
    touch "$config" && chmod 0600 "$config"
    if ! grep -q "^Host {{ mcsearch_remote_host }}$" "$config"; then
      printf '\nHost %s\n    HostName %s\n    Port %s\n    User %s\n' \
        '{{ mcsearch_remote_host }}' '{{ mcsearch_remote_ip }}' \
        '{{ mcsearch_remote_ssh_port }}' '{{ mcsearch_remote_user }}' >> "$config"
    fi
  unless_command: "grep -q '^Host {{ mcsearch_remote_host }}$' ~/.ssh/config 2>/dev/null"
  when: mcsearch_role == 'client'
  tags: [mcsearch, tunnel]

- name: "Deploy mcsearch-tunnel user systemd unit"
  file.template:
    src: ./templates/mcsearch-tunnel.service.j2
    dest: "~/.config/systemd/user/mcsearch-tunnel.service"
  when: mcsearch_role == 'client' and os == 'linux'
  tags: [mcsearch, tunnel]

- name: "Enable and start mcsearch-tunnel.service"
  shell: |
    systemctl --user daemon-reload
    systemctl --user enable --now mcsearch-tunnel.service
  when: mcsearch_role == 'client' and os == 'linux'
  tags: [mcsearch, tunnel]

- name: "Deploy mcsearch-tunnel launchd plist (mac)"
  file.template:
    src: ./templates/mcsearch-tunnel.plist.j2
    dest: "~/Library/LaunchAgents/com.alehatsman.mcsearch-tunnel.plist"
  when: mcsearch_role == 'client' and os == 'darwin'
  tags: [mcsearch, tunnel]

- name: "Load mcsearch-tunnel launchd plist (mac)"
  shell: |
    plist=~/Library/LaunchAgents/com.alehatsman.mcsearch-tunnel.plist
    launchctl unload "$plist" 2>/dev/null || true
    launchctl load "$plist"
  when: mcsearch_role == 'client' and os == 'darwin'
  tags: [mcsearch, tunnel]

# ───────────────── AUTO-REINDEX (mcsearch watch) ───────────────────────────
#
# A templated user systemd unit so each indexed project gets its own
# fsnotify-driven watcher. Long-lived projects opt in declaratively via
# mcsearch_watch_paths in machine vars; ad-hoc worktrees pick up watches
# automatically through the zsh gwc helper (components/zsh).
#
# Linux-only by design — mac clients have no equivalent watcher, since
# long-lived projects live on the GPU host (main_pc) and the Mac is a
# read-only consumer over the tunnel.

- name: "Deploy mcsearch-watch@ templated systemd unit"
  file.template:
    src: ./templates/mcsearch-watch@.service.j2
    dest: "~/.config/systemd/user/mcsearch-watch@.service"
  when: os == 'linux'
  tags: [mcsearch, watch]

- name: "Reload user systemd so mcsearch-watch@ is discoverable"
  shell: systemctl --user daemon-reload
  when: os == 'linux'
  changed_when: false
  tags: [mcsearch, watch]

# Empty mcsearch_watch_paths = additive mode (leave existing instances
# alone). Listing one or more paths flips into declarative mode: enable
# each, disable any other mcsearch-watch@* instance.
# Existing watch instances cache their ExecStart from when they were
# started, so a template change (e.g. mcsearch_bin_path moves) doesn't
# propagate until the instance is restarted. try-restart only acts on
# running units, so this is a no-op when nothing's enabled.
- name: "Restart any running mcsearch-watch@* to pick up new template"
  shell: |
    set -euo pipefail
    instances=$(systemctl --user list-units --type=service --no-legend 'mcsearch-watch@*' 2>/dev/null | awk '{print $1}')
    for u in $instances; do
      systemctl --user try-restart "$u" || true
    done
  when: os == 'linux'
  changed_when: false
  tags: [mcsearch, watch]

- name: "Sync mcsearch-watch instances against mcsearch_watch_paths"
  # Pongo2 (mooncake's templater) treats `{#` as a block-comment opener,
  # so any literal `${#paths[@]}` blows up at parse time. Check the input
  # variable instead — same effect, no `{#` bigram.
  shell: |
    set -euo pipefail
    declared='{{ mcsearch_watch_paths }}'
    if [[ -z "${declared// /}" ]]; then
      echo "mcsearch_watch_paths empty — leaving existing watch instances alone"
      exit 0
    fi
    declare -a paths
    read -ra paths <<<"$declared"
    for p in "${paths[@]}"; do
      esc=$(systemd-escape "$p")
      systemctl --user enable --now "mcsearch-watch@${esc}.service"
    done
    wants_dir="$HOME/.config/systemd/user/default.target.wants"
    [[ -d "$wants_dir" ]] || exit 0
    shopt -s nullglob
    for f in "$wants_dir"/mcsearch-watch@*.service; do
      unit=$(basename "$f")
      inst=${unit#mcsearch-watch@}
      inst=${inst%.service}
      # `--` is load-bearing: $inst always starts with `-` (every absolute
      # path escapes `/` to `-`), so without it systemd-escape misreads the
      # arg as malformed flags, prints usage to stderr, and emits nothing
      # on stdout — every entry then looks "stale" and the loop disables
      # every running watcher.
      path=$(systemd-escape --unescape -- "$inst")
      found=0
      for p in "${paths[@]}"; do
        [[ "$p" == "$path" ]] && { found=1; break; }
      done
      if [[ "$found" -eq 0 ]]; then
        echo "disabling stale: $unit ($path)"
        systemctl --user disable --now "$unit"
      fi
    done
  when: os == 'linux'
  tags: [mcsearch, watch]

# ───────────────── SERVER (main_pc) ────────────────────────────────────────

- import: ./server.yml
  when: mcsearch_role == 'server'
  tags: [mcsearch, server]

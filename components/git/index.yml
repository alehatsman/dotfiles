---
- name: Make sure git is installed
  pkg:
    name: git
    state: present
  as_user: root
  when: os == 'linux'
  tags: [git, install]

- name: Deploy .gitconfig
  file.template:
    src: ./.gitconfig.j2
    dest: ~/.gitconfig
  tags: [git, config]

- name: Verify git installation
  assert:
    command:
      cmd: which git
  tags: [git, verify]

- name: Verify git config
  assert:
    command:
      cmd: git config --get user.name
  tags: [git, verify]

---
# Google Cloud SDK install.
#
# Linux: pkg.repo apt driver handles keyring + DEB822 source + apt-get
# update atomically.
#
# macOS: brew cask (proposal-20 shipped in mooncake).

- name: Register Google Cloud apt repo
  pkg.repo:
    name: google-cloud-sdk
    state: present
    apt:
      uri: https://packages.cloud.google.com/apt
      suites: [cloud-sdk]
      components: [main]
      gpg_key_url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
      gpg_check: false
  as_user: root
  when: os == 'linux'

- name: Install google-cloud-cli (apt)
  pkg:
    name: google-cloud-cli
    state: present
  as_user: root
  when: os == 'linux'

- name: Install google-cloud-sdk (brew cask, macOS)
  pkg:
    name: google-cloud-sdk
    manager: brew
    cask: true
    state: present
  when: os == 'darwin'
  timeout: 10m

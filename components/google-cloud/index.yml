---
# Google Cloud SDK install.
#
# Linux: pkg.repo apt driver handles keyring + DEB822 source + apt-get
# update atomically.
#
# macOS: brew cask. `pkg.cask` is not yet a mooncake action
# (proposal-20 in mooncake-repo), so this stays as shell until that lands.

- name: Register Google Cloud apt repo
  pkg.repo:
    name: google-cloud-sdk
    state: present
    apt:
      uri: https://packages.cloud.google.com/apt
      suites: [cloud-sdk]
      components: [main]
      gpg_key_url: https://packages.cloud.google.com/apt/doc/apt-key.gpg
      gpg_check: false
  as_user: root
  when: os == 'linux'

- name: Install google-cloud-cli (apt)
  pkg:
    name: google-cloud-cli
    state: present
  as_user: root
  when: os == 'linux'

# macOS: brew cask. No `pkg.cask` action yet; keep as shell until one
# lands.
- name: Install google-cloud-sdk (brew cask, macOS)
  shell: brew install --cask google-cloud-sdk
  when: os == 'darwin'
  timeout: 10m

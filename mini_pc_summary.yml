---
# mini_pc — summary-worker profile (RTX 5080 as fleet summary endpoint).
#
# Apply:  mooncake apply -c ./mini_pc_summary.yml
# Plan:   mooncake plan  -c ./mini_pc_summary.yml
#
# Installs ollama on mini_pc and pulls the summary model tiers (3b/7b/14b).
# main_pc's dex instance tunnels DEX_SUMMARY_URL here so its 5090 is freed
# for the foreground path (embed, ask-32b, compress, rerank) with no GPU
# contention from background summarization.
#
# Apply mini_pc.yml first (base machine setup). This manifest adds only the
# summary worker stack on top — it is idempotent and safe to re-run.
#
# Prerequisite: confirm GPU is visible inside WSL before applying.
#   nvidia-smi || /usr/lib/wsl/lib/nvidia-smi

- vars.load: ./shared/variables.yml
- vars.load: ./machines/mini_pc/vars.yml
- vars.load: ./machines/mini_pc/profiles/summary-worker.yml
- import: ./components/dex/summary-worker.yml

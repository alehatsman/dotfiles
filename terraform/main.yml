---
- name: Make sure hashicorp gpg key is present
  shell: |
    curl https://apt.releases.hashicorp.com/gpg -o /usr/share/keyrings/hashicorp.gpg
  as_user: root
  when: os == 'linux'

- name: Make sure terraform is installed
  shell: |
    apt-get install terraform
  as_user: root
  when: os == 'linux'

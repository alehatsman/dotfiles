---
# One-time setup that every machine wants up-front. The mooncake-preset
# library bootstrap that used to live here was retired alongside the
# in-tree presets/ directory in the mooncake repo. Components install
# their packages directly until the Git-native module system (mooncake
# spec-65) lands and these can become `use: github.com/...` refs.

- name: Rename ~/Projects to ~/projects (lowercase convention)
  cmd:
    argv: [mv, '{{ "~/Projects" | expanduser }}', '{{ "~/projects" | expanduser }}']
  when: os == "linux"
  unless_command: test -e "$HOME/projects" || ! test -d "$HOME/Projects"
  tags: [core, home]

# User-scope systemd units (dex-tunnel, dex-watch@, and the
# mooncake agentd itself once it lands in --user mode) need to survive
# logout — otherwise remote fleet apply against a non-interactive peer
# has no user systemd bus to talk to. Idempotent: enable-linger is a
# no-op when already enabled.
- name: Enable systemd linger for {{ username }} so user services survive logout
  shell: loginctl enable-linger {{ username }}
  unless_command: loginctl show-user {{ username }} 2>/dev/null | grep -q '^Linger=yes$'
  when: os == "linux"
  tags: [core, systemd]

# Passwordless sudo for the provisioning user. Required after the
# user-mode agentd switch: previously the agentd ran as root and any
# `as_user: root` step was a no-op-on-uid, but a user-mode agentd has
# to escalate via sudo for those steps. The first apply needs
# `--ask-become-pass` to land this sudoers entry; subsequent applies
# are passwordless. Content is a single fixed line with only
# {{ username }} interpolated, so there's no template path that
# produces invalid sudoers syntax — but a typo here lands without
# visudo validation, so review changes carefully.
- name: Configure passwordless sudo for {{ username }}
  file.write:
    path: /etc/sudoers.d/{{ username }}-nopasswd
    state: file
    content: |
      {{ username }} ALL=(ALL) NOPASSWD: ALL
    mode: '0440'
  as_user: root
  when: os == "linux"
  tags: [core, sudo]

# Docker Desktop's WSL integration writes `credsStore: desktop.exe` into
# ~/.docker/config.json. That Windows credential helper isn't on PATH in this
# Linux env, so any image pull dies with exit 127 (`docker-credential-
# desktop.exe not found`) — which silently breaks server-side CI whenever a
# runner image must be pulled (dotfiles#8, surfaced via dex#25/#63). Strip the
# key so docker falls back to its default store. Idempotent: the gate skips the
# step once the file is absent or no longer names the broken helper.
- name: Drop the WSL2-broken Docker credsStore (desktop.exe) so image pulls work
  shell: |
    set -euo pipefail
    cfg="$HOME/.docker/config.json"
    tmp=$(mktemp)
    jq 'del(.credsStore)' "$cfg" > "$tmp" && mv "$tmp" "$cfg"
  unless_command: |
    cfg="$HOME/.docker/config.json"
    ! test -f "$cfg" || ! jq -e '.credsStore == "desktop.exe"' "$cfg" >/dev/null 2>&1
  when: os == "linux"
  tags: [core, docker]

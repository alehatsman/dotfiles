---
# Cross-machine identity. Per-machine vars live in vars/<machine>.yml and
# are layered on top via a second `-v` flag.
#
#   mooncake apply -c entries/<machine>.yml -v variables.yml -v vars/<machine>.yml -K
#
# The current OS username is exposed by mooncake as {{ username }} — no
# need to set it here.
FULLNAME: "Aleh Atsman"
EMAIL: aleh.atsman@gmail.com
use_win32yank: false

# ─── Color palette ──────────────────────────────────────────────────────────
# Selects which Monokai variant gets loaded by components/palette/index.yml.
# Every templated config across this repo (alacritty, waybar, wofi, dunst,
# hyprlock, hyprland, tmux, zsh fzf, vim) reads palette.* / editor.* from
# the chosen variant. Override per-machine in machines/<m>/vars.yml.
#   monokai_dark   — canonical Sublime ST2 Monokai (default)
#   monokai_light  — Sublime Monokai Light companion variant
palette_variant: monokai_dark

# ─── mcsearch — local semantic-search MCP helper ───────────────────────────
# Default role is client (install the binary + tunnel + MCP registration).
# main_pc overrides to `server` to additionally run the embedding service
# on its 5090. Machines that don't want mcsearch at all simply omit the
# component import from their machines/<m>/index.yml.
mcsearch_role: client

# Embedding model. Code-retrieval quality vs VRAM trade-off documented in
# components/mcsearch/README.md. Ollama-style ref (vs HF-style for vLLM).
mcsearch_embed_model: "qwen3-embedding:4b"

# Chat-completion model powering mcsearch's `generate_code` MCP tool +
# `mcsearch generate` CLI. Served by the same ollama instance as the
# embedding model on the GPU host (so no second port / second tunnel).
# 32B Q4_K_M is ~20 GB, comfortably fits alongside the 4B embedder on
# a 5090 (32 GB VRAM); step down to qwen2.5-coder:14b (~9 GB) or :7b
# on smaller GPUs.
mcsearch_chat_model: "qwen2.5-coder:32b"

# Port the ollama service listens on inside WSL (always bound to
# 127.0.0.1; reached by clients through an SSH tunnel — see
# components/mcsearch/templates/mcsearch-tunnel.service.j2). Ollama
# serves both /v1/embeddings and /v1/chat/completions on this port,
# so embed and chat share the same tunnel.
mcsearch_remote_port: "11434"
mcsearch_local_port: "11434"

# SSH alias for the GPU host. Resolved via ~/.ssh/config — the user is
# expected to have a `Host main_pc-wsl` entry that points at the WSL SSH
# port (typically <main_pc-lan-ip>:2222 with the appropriate key).
mcsearch_remote_host: "main_pc-wsl"

# Space-separated list of absolute project roots to auto-watch via
# mcsearch-watch@.service. The apply step enables one user systemd
# instance per path and disables any orphaned instance no longer in the
# list. Empty = additive mode (leave existing instances alone). Paths
# must not contain spaces. Ad-hoc worktrees pick up their own watch
# instance through the zsh gwc/gwd helpers — only long-lived project
# roots belong here.
mcsearch_watch_paths: ""

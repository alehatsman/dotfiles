---
# Cross-machine identity. Per-machine vars live in vars/<machine>.yml and
# are layered on top via a second `-v` flag.
#
#   mooncake apply -c entries/<machine>.yml -v variables.yml -v vars/<machine>.yml -K
#
# The current OS username is exposed by mooncake as {{ username }} — no
# need to set it here.
FULLNAME: "Aleh Atsman"
EMAIL: aleh.atsman@gmail.com
use_win32yank: false

# WSL2 networking mode for Windows hosts (platforms/windows). Default
# "mirrored" (guest ports on the host NIC directly). Override per-machine to
# "nat" to use an internal IP + netsh portproxy + a persistent-session
# keepalive — more robust LAN reachability where mirrored flaps (dotfiles #16).
wsl_networking_mode: "mirrored"

# Disable Windows sleep and hibernate on AC power (server/always-on boxes).
# Set true per-machine in machines/<m>/vars.yml. Default false (laptops keep
# their power policy).
windows_prevent_sleep: false

# ─── claude — global system prompt (~/.claude/CLAUDE.md) ──────────────────
# Source file the claude component deploys as the user-global system prompt.
# Path is resolved relative to components/claude/. Default is the shared
# hacker-trooper prompt; machines override per-host in machines/<m>/vars.yml
# (main_pc points this at its own mgit-coordination + dex-intel variant).
claude_system_prompt_src: "./CLAUDE.md"

# ─── Color palette ──────────────────────────────────────────────────────────
# Selects which Monokai variant gets loaded by components/palette/index.yml.
# Every templated config across this repo (alacritty, waybar, wofi, dunst,
# hyprlock, hyprland, tmux, zsh fzf, vim) reads palette.* / editor.* from
# the chosen variant. Override per-machine in machines/<m>/vars.yml.
#   monokai_dark   — canonical Sublime ST2 Monokai (default)
#   monokai_light  — Sublime Monokai Light companion variant
palette_variant: monokai_dark

# ─── dex — local semantic-search MCP helper ───────────────────────────
# Default role is client (install the binary + tunnel + MCP registration).
# main_pc overrides to `server` to additionally run the embedding service
# on its 5090. Machines that don't want dex at all simply omit the
# component import from their machines/<m>/index.yml.
dex_role: client

# Source URL for the dex git repo. The component clones this into
# dex_src_dir (components/dex/variables.yml) and builds from it.
# Default is the moongit host loopback (main_pc: moongitd on :8080).
# Non-server machines override this in machines/<m>/vars.yml to the
# moongit host's LAN IP (e.g. mini_pc → 192.168.50.1:8080).
# Lives here — not in components/dex/variables.yml — so machine overrides
# win (component vars.load runs after machine vars and would clobber).
dex_src_url: "http://127.0.0.1:8080/alehatsman/dex.git"

# Embedding model. Code-retrieval quality vs VRAM trade-off documented in
# components/dex/README.md. Ollama-style ref (vs HF-style for vLLM).
# No default here — every machine sets this in its own vars.yml so that
# any apply path (agentd, partial tag filter, etc.) renders the right model
# rather than silently falling through to a stale shared value.
# dex_embed_model: "nomic-embed-text:latest"   ← set per machine

# Chat-completion model powering dex's `generate_code` MCP tool +
# `dex generate` CLI. Served by the same ollama instance as the
# embedding model on the GPU host (so no second port / second tunnel).
# 32B Q4_K_M is ~20 GB, comfortably fits alongside the 4B embedder on
# a 5090 (32 GB VRAM); step down to qwen2.5-coder:14b (~9 GB) or :7b
# on smaller GPUs.
# No default here — set per machine (same reason as dex_embed_model above).
# dex_chat_model: "qwen2.5-coder:14b"          ← set per machine

# Optional second chat model used only by ask_codebase. Plumbing is
# in place but no local model tested so far (qwen2.5-coder:32b,
# qwen2.5:14b-instruct) consistently follows the citations-first
# system prompt — the coder pattern-matches paths from CONTEXT but
# still emits fenced code blocks; the instruct model invents whole
# project layouts. Leave empty to fall back to dex_chat_model.
# Revisit when a stronger local model lands (qwen2.5:72b-instruct,
# DeepSeek-V3, etc.) or wire a hosted Claude/GPT-4 endpoint.
dex_ask_model: ""

# Port the ollama service listens on inside WSL (always bound to
# 127.0.0.1; reached by clients through an SSH tunnel — see
# components/dex/templates/dex-tunnel.service.j2). Ollama
# serves both /v1/embeddings and /v1/chat/completions on this port,
# so embed and chat share the same tunnel.
dex_remote_port: "11434"
dex_local_port: "11434"

# Cross-encoder rerank endpoint. ollama doesn't expose /v1/rerank, so
# this is a separate service on the GPU host. Two styles are supported:
#
#   cohere: Cohere-compatible /rerank endpoint — TEI or Infinity serving
#     a cross-encoder (bge-reranker-v2-m3 etc.).
#
#   chat-vllm (default): vLLM pointwise scorer via /v1/chat/completions with
#     empty <think>\n\n</think> prefill — Qwen3-Reranker-4B (~3 GB Q4,
#     MTEB-Code 81.20 vs 41.38 for bge-v2-m3). server.yml deploys a vLLM
#     container (vllm/vllm-openai) loading the GGUF via --load-format gguf.
#
# The SSH tunnel forwards both this port and the ollama port over the same
# connection — see dex-tunnel.service.j2.
dex_rerank_remote_port: "8082"
dex_rerank_local_port: "8082"

# Rerank backend style: "cohere" or "chat-vllm" (see comment above).
dex_rerank_style: "chat-vllm"

# Rerank model name (HuggingFace repo, tokenizer) passed to the backend.
# Qwen3-Reranker-4B: MTEB-Code 81.20 vs 41.38 for the old bge-reranker-v2-m3.
dex_rerank_model: "Qwen/Qwen3-Reranker-4B"

# GGUF variant for chat-vllm style — separate repo + file so the tokenizer
# (dex_rerank_model above) stays as the canonical model reference for dex.
dex_rerank_gguf_repo: "Mungert/Qwen3-Reranker-4B-GGUF"
dex_rerank_gguf_file: "Qwen3-Reranker-4B-Q4_K_M.gguf"

# Pass --gpus all to the rerank container (Infinity or vLLM). Set "" to run
# CPU-only (acceptable for 10–50 candidates post-retrieval; frees VRAM).
# Default "1" = GPU on all hosts unless overridden.
dex_rerank_gpu: "1"

# Candidate-pool cap fed to the reranker per query. Larger = better recall,
# slower rerank. Binary clamps to [1, 100] and falls back to 40 on parse error.
dex_rerank_pool: "40"

# Number of concurrent scoring goroutines (chat style only). Each goroutine
# makes one HTTP call per (query, doc) pair; more concurrency = faster wall
# time at the cost of more simultaneous vLLM load. 8 is comfortable on a
# 5090 even with the 32B chat model sharing VRAM.
dex_rerank_concurrency: "8"

# Context compression — distils retrieved chunks into a ≤350-word prose
# summary before injecting them into the chat model's context window.
# Reduces tokens sent to Claude by 4–5× per ask_codebase / generate_code
# call at the cost of one extra local-model round-trip. Qwen3-8B at ~185 t/s
# on RTX 5090 (Q4_K_M, ~4.8 GB) — fast, fits alongside the 30B-A3B ask model
# under time-multiplexing. Set port to "" to disable on machines without
# the tunnel.
dex_compress_port: "11434"
dex_compress_model: "qwen3:8b"

# Speculative local draft — pre-generates a code implementation with a
# small coder model before Claude refines it. The whole point is that
# draft latency hides behind Claude's network/thinking RTT, so the
# draft must be MUCH faster than chat. Qwen3-8B shares the compress slot
# so no extra VRAM. Set port to "" to disable.
dex_draft_port: "11434"
dex_draft_model: "qwen3:8b"

# Index-time summary model — overrides the chat leg used during indexing
# (file / chunk / package / repo summaries). Outputs are 1–4 sentences.
# Qwen3-14B Q5_K_M (~12.9 GB) matches Qwen2.5-32B on coding benchmarks
# at ~59 t/s on RTX 5080. Non-thinking mode mandatory for summaries.
# Set port to "" to fall back to dex_chat_model.
dex_summary_port: "11434"
dex_summary_model: "qwen3:14b"
# Per-tier summary model overrides. Empty = inherit dex_summary_model.
# Lets boxes with VRAM headroom (e.g. 5090) route the dozen package
# summaries and the single repo summary that compound into LLM_GUIDE.md
# through a much heavier model than the hundreds of chunk summaries.
# Tier ordering reflects call volume — chunk fires per code chunk
# (hundreds), file per file (tens), package per directory (~dozens),
# repo once per project. Default empty across the fleet; main_pc
# overrides with the 3b/7b/14b/32b ladder.
dex_chunk_summary_model: ""
dex_file_summary_model: ""
dex_package_summary_model: ""
dex_repo_summary_model: ""
# Conservative default. The GPU host (main_pc/5090, 32 GB VRAM) bumps
# this in machines/main_pc/vars.yml — push it as high as the local
# ollama can serve concurrent /chat requests without VRAM thrash.
dex_summary_concurrency: "4"
dex_chunk_summary_min_lines: "50"

# Embed batch size — chunks per /v1/embeddings call. The dex default
# is 32; 128 cuts request overhead with no measurable quality cost on
# Ollama or vLLM/TEI. Larger batches show bigger wins on big repos.
dex_embed_batch: "128"

# Loopback port for `dex serve` — the HTTP query API consumed by moongit's
# Intel tab (components/dex deploys dex-serve.service server-side; moongit's
# MOONGIT_DEX_URL points here). Bound to 127.0.0.1, so no token/firewall
# rule. Distinct from moongit (:8080), ollama (:11434), rerank (:8082).
dex_serve_port: "7920"

# OLLAMA_NUM_PARALLEL — max concurrent generation requests ollama will
# pack into a single model. Deployed as a systemd drop-in on the GPU
# host (components/dex/templates/ollama-num-parallel.conf.j2). 4 is
# upstream's default since v0.2.0 but is set explicitly here so a
# future upstream change can't silently regress the summary/rerank
# concurrency caps that assume it.
dex_ollama_num_parallel: "4"

# OLLAMA_KEEP_ALIVE — how long ollama keeps a model resident after its
# last request. Upstream default is 5m; kept here so it's explicit and
# overridable per host. The GPU host pins models warm (-1) in
# machines/main_pc/vars.yml — see the note there. Deployed as a systemd
# drop-in (components/dex/templates/ollama-keep-alive.conf.j2).
dex_ollama_keep_alive: "5m"

# DEX_POWER_SAVE — when truthy, dex `serve` / `mcp` watchers keep the
# index fresh (embed reindex) but skip background summary draining (no
# chat-model gen). Default off (fleet behaviour unchanged). The GPU host
# sets it on (machines/main_pc/vars.yml) so foreground `ask` isn't
# starved by summary churn, and so the warm-pin (dex_ollama_keep_alive
# = -1) can't be OOM'd by the summary model ladder loading. Wired into
# the MCP registration (components/dex/index.yml) and the dex-serve unit.
dex_power_save: ""

# DEX_SUMMARIZE_YIELD — when set (e.g. "10s"), the background summary
# drainer skips a tick if a foreground query (ask/search/symbol/graph)
# ran within this window, so interactive latency wins over summary
# freshness. Cross-process via a marker file (dex #17). Default off
# (""). The GPU host turns it on. Wired into the MCP registration and
# the dex-serve unit alongside DEX_POWER_SAVE.
dex_summarize_yield: ""

# SSH alias for the GPU host — used by both the tunnel template and the
# ssh-config step managed by the dex client install. The dex
# component writes a Host block into ~/.ssh/config on client machines
# so the tunnel can resolve the alias without a manual prerequisite.
dex_remote_host: "main_pc-wsl"
dex_remote_ip: "192.168.1.68"
dex_remote_ssh_port: "2222"
dex_remote_user: "aleh"

# Remote summary worker — when dex_summary_host is non-empty, the GPU host
# offloads all summary generation to a second machine (e.g. mini_pc's 5080)
# via an SSH tunnel. DEX_SUMMARY_URL is pointed at the local tunnel port
# (dex_summary_port, which the GPU host sets to dex_summary_local_port).
# Empty = local ollama handles summaries (default fleet behaviour).
dex_summary_host: ""
dex_summary_host_ip: ""
dex_summary_host_ssh_port: "2222"
dex_summary_host_user: "aleh"
# Local port the summary tunnel binds on the GPU host; must match
# dex_summary_port on that machine so DEX_SUMMARY_URL resolves correctly.
dex_summary_local_port: "11435"

# Summary router — when dex_summary_router is truthy, the GPU host runs a
# small model-name-routing reverse proxy (components/dex/router) in front of
# DEX_SUMMARY_URL so the single dex drainer can fan summary chat calls across
# BOTH GPUs. The host points dex_summary_port at the router; the router's
# REMOTE upstream is the summary tunnel (dex_summary_local_port → 5080) and
# its LOCAL upstream is this box's ollama (dex_local_port → 5090).
#   steady (default): every call → REMOTE. Identical to no router in the path.
#   burst:            the chunk tier (dex_summary_router_local_models) → LOCAL,
#                     heavier tiers → REMOTE. Flip with `dex-summary-mode burst`
#                     to push coverage to 100% across both GPUs after a reindex;
#                     `dex-summary-mode steady` flips back and `ollama stop`s the
#                     lent model to free the warm-pin headroom.
# Empty = off (default fleet behaviour). dotfiles #32.
dex_summary_router: ""
# Loopback port the router listens on (distinct from the tunnel's 11435 and
# ollama's 11434). When the router is enabled the GPU host sets
# dex_summary_port to this so DEX_SUMMARY_URL resolves to the router.
dex_summary_router_port: "11436"
# Models routed to the LOCAL upstream (this box's GPU) in burst mode,
# comma-separated. Default: the high-volume chunk tier only — a 3b fits the
# 5090's warm-pin headroom (~3 GB) without evicting the 32b ask model.
dex_summary_router_local_models: "qwen3:14b"
# Flood mode (`dex-summary-mode flood`) — the router round-robins ALL summary
# tiers across both GPUs at once for maximum catch-up throughput. To make room
# on the local card it evicts dex_summary_router_flood_evict (the foreground
# ask model); returning to steady re-warms it and stops the summary-only tiers
# in dex_summary_router_steady_stop (kept separate so the 7b compress model
# isn't dropped). Empty = no-op; only the GPU host with a local ask model sets
# these (machines/main_pc/vars.yml). dotfiles #34.
dex_summary_router_flood_evict: ""
dex_summary_router_steady_stop: ""

# Space-separated list of absolute project roots to auto-watch via
# dex-watch@.service. The apply step enables one user systemd
# instance per path and disables any orphaned instance no longer in the
# list. Empty = additive mode (leave existing instances alone). Paths
# must not contain spaces. Ad-hoc worktrees pick up their own watch
# instance through the zsh gwc/gwd helpers — only long-lived project
# roots belong here.
dex_watch_paths: ""

# Source checkout of mooncake, shared by the moongit + dex CI-image build
# steps: each bakes this mooncake into its CI container image (the runner
# execs it inside every CI job), so it must stay current enough to parse the
# repo's tasks.yml syntax. Shared (not component-local) so both components
# resolve it regardless of apply order. See moongit#193 / dex#27.
mooncake_src_dir: "~/projects/mooncake"

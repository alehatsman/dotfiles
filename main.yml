---
steps:
  # Arch Linux system setup — packages, services, shell default
  - import: ./platforms/arch/main.yml
    when: os == "linux" and distribution == "arch"
    tags: [arch, system, packages]

  - import: ./claude/main.yml
    tags: [core, claude]

  # Version control
  - import: ./git/main.yml
    tags: [core, git]

  # Programming languages - Using Presets
  - name: Install Python via pyenv
    use:
      name: python
      with:
        version: "3.12.12"
        install_virtualenv: true
    tags: [dev, python]

  - name: Install Rust toolchain
    use:
      name: rust
      with:
        toolchain: stable
        profile: default
    tags: [dev, rust]

  # Node.js already installed manually (v22.22.0)
  # - name: Install Node.js via nvm
  #   preset: nodejs
  #   with:
  #     version: "22"
  #     global_packages:
  #       - webpack
  #       - eslint
  #       - prettier
  #   tags: [dev, node]

  # Modern Unix tools
  # TODO: modern-unix preset has issues with templated state parameter
  # - name: Install modern Unix tools
  #   preset: modern-unix
  #   with:
  #     tools:
  #       - bat        # cat with syntax highlighting
  #       - exa        # ls replacement
  #       - zoxide     # smart cd
  #       - dust       # du replacement
  #       - duf        # df replacement
  #       - bottom     # top/htop replacement
  #   tags: [tools, modern-unix]

  - name: Install Go toolchain
    use:
      name: go
      with:
        version: "latest"
    tags: [dev, golang]

  # Other languages
  - name: Install Java JDK
    use:
      name: java
      with:
        version: "21"
        set_java_home: true
    tags: [dev, java]

  - name: Install Clojure
    use:
      name: clojure
    tags: [dev, clojure]

  - name: Deploy Clojure configs
    import: ./clojure/config.yml
    tags: [dev, clojure, config]

  # Terminal tools
  - name: Install fzf fuzzy finder
    use:
      name: fzf
      with:
        install_shell_extensions: true
        install_vim_plugin: false
    tags: [tools, fzf]

  - import: ./zsh/main.yml
    tags: [core, shell]

  # Tmux - using custom installation due to preset template issue
  - import: ./tmux/install.yml
    tags: [tools, tmux]

  - name: Deploy tmux config
    import: ./tmux/config.yml
    tags: [tools, tmux, config]

  # Editors
  - import: ./nvim/main.yml
    tags: [editor, nvim]

  # macOS specific
  # Note: Install Alacritty via Homebrew cask: brew install --cask alacritty
  - name: Deploy Alacritty config
    import: ./alacritty/config.yml
    when: os == "darwin"
    tags: [macos, terminal, config]

  - import: ./platforms/macos/main.yml
    when: os == "darwin"
    tags: [macos]

  # Windows WSL2 — SSH, CUDA, compute packages
  - import: ./platforms/windows/wsl.yml
    when: is_wsl
    tags: [wsl, windows]

  # Linux GUI — Hyprland Wayland compositor
  - name: Install Hyprland desktop
    use:
      name: hyprland
    when: os == "linux" and distribution == "arch"
    tags: [gui, hyprland]

  - name: Deploy Hyprland configs
    import: ./hyprland/main.yml
    when: os == "linux"
    tags: [gui, hyprland, config]

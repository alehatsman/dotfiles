version: '1'

# Dotfiles dev surface, driven by `mooncake task`.
#
#   mooncake task                 # list available targets
#   mooncake task <machine>       # apply config for that machine
#   mooncake task <machine>-plan  # preview without applying
#   mooncake task backup          # snapshot rc files to ~/.dotfiles-backup
#
# Per-machine `apply` targets that touch privileged ops pass `-K` so
# mooncake prompts for the sudo password once. Plan-mode targets skip
# `-K` — plan never escalates.

tasks:

  # ── x1 (Arch laptop, Hyprland) ───────────────────────────────────────
  x1:
    desc: Apply on x1 (Arch laptop, Hyprland)
    steps:
      - shell: { cmd: "mooncake apply -c ./x1.yml -K" }

  x1-plan:
    desc: Plan on x1 (no changes)
    steps:
      - shell: { cmd: "mooncake plan -c ./x1.yml" }

  # ── main_pc (WSL on Windows host) ────────────────────────────────────
  main_pc:
    desc: Apply inside WSL on main_pc (run bootstrap.yml on the Windows host first)
    steps:
      - shell: { cmd: "mooncake apply -c ./main_pc.yml" }

  main_pc-plan:
    desc: Plan inside WSL on main_pc
    steps:
      - shell: { cmd: "mooncake plan -c ./main_pc.yml" }

  # ── mini_pc (WSL) ────────────────────────────────────────────────────
  mini_pc:
    desc: Apply inside WSL on mini_pc
    steps:
      - shell: { cmd: "mooncake apply -c ./mini_pc.yml" }

  mini_pc-plan:
    desc: Plan inside WSL on mini_pc
    steps:
      - shell: { cmd: "mooncake plan -c ./mini_pc.yml" }

  # ── mac ──────────────────────────────────────────────────────────────
  mac:
    desc: Apply on macOS
    steps:
      - shell: { cmd: "mooncake apply -c ./mac.yml -K" }

  mac-plan:
    desc: Plan on macOS
    steps:
      - shell: { cmd: "mooncake plan -c ./mac.yml" }

  # ── Backup ───────────────────────────────────────────────────────────
  # The Makefile re-invoked `date` per command, so each `cp` could
  # straddle a second boundary and write to different directories. The
  # script-form below computes the timestamp once and reuses it.
  backup:
    desc: Snapshot ~/.zshrc, ~/.tmux.conf, ~/.gitconfig to ~/.dotfiles-backup
    steps:
      - shell:
          cmd: |
            ts=$(date +%Y%m%d_%H%M%S)
            dest="$HOME/.dotfiles-backup/$ts"
            mkdir -p "$dest"
            for f in .zshrc .tmux.conf .gitconfig; do
              if [ -f "$HOME/$f" ]; then
                cp "$HOME/$f" "$dest/$f"
                echo "Backed up ~/$f"
              fi
            done
            echo "Backup complete in $dest/"

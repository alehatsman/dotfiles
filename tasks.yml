version: '1'

# Dotfiles dev surface, driven by `mooncake task`.
#
#   mooncake task                 # list available tasks
#   mooncake task <machine>       # apply config for that machine
#   mooncake task <machine> -p    # preview without applying (--plan)
#   mooncake task <machine> -K    # apply with interactive sudo prompt
#                                 # (needed on x1 and mac; main_pc and
#                                 # mini_pc have NOPASSWD sudo)
#   mooncake task backup          # snapshot rc files to ~/.dotfiles-backup
#
# Per-machine tasks use mooncake's native `import:` so the steps from
# the machine yml expand inline at plan time. That means `--plan`
# renders the actual underlying steps (not a black-box "would run
# shell"), and `-K` propagates through normally. Earlier versions of
# this file shelled out to `mooncake apply -c <machine>.yml`; that
# spawned a nested mooncake process, dropped ANSI color in the wrap,
# saturated the event channel on noisy plans, and made `--plan` show
# only the outer shell wrapper.

tasks:

  x1:
    desc: Apply on x1 (Arch laptop, Hyprland) — pass -K for sudo prompt
    steps:
      - import: ./x1.yml

  main_pc:
    desc: Apply inside WSL on main_pc (run platforms/windows/bootstrap.yml first)
    steps:
      - import: ./main_pc.yml

  mini_pc:
    desc: Apply inside WSL on mini_pc
    steps:
      - import: ./mini_pc.yml

  mac:
    desc: Apply on macOS — pass -K for sudo prompt
    steps:
      - import: ./mac.yml

  # backup is a one-off shell script; no machine yml to import. Kept
  # as a shell step because the timestamp computation needs to happen
  # once and be reused across cp invocations.
  backup:
    desc: Snapshot ~/.zshrc, ~/.tmux.conf, ~/.gitconfig to ~/.dotfiles-backup
    steps:
      - shell:
          cmd: |
            ts=$(date +%Y%m%d_%H%M%S)
            dest="$HOME/.dotfiles-backup/$ts"
            mkdir -p "$dest"
            for f in .zshrc .tmux.conf .gitconfig; do
              if [ -f "$HOME/$f" ]; then
                cp "$HOME/$f" "$dest/$f"
                echo "Backed up ~/$f"
              fi
            done
            echo "Backup complete in $dest/"

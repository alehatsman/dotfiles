---
- name: Upgrade all installed apt packages
  pkg.upgrade: {}
  as_user: root
  timeout: 15m
  retry:
    attempts: 3
    delay: 10s

- name: Install bootstrap packages (needed before add-apt-repository / pkg.repo)
  pkg:
    state: present
    names:
      - gnupg
      - software-properties-common
      - curl
      - ca-certificates
      - apt-transport-https
  as_user: root
  timeout: 10m
  retry:
    attempts: 3
    delay: 10s

# Neovim PPA — kept as shell until mooncake's apt pkg.repo driver
# (currently dnf-only) gains PPA support. See dotfiles survey TODO.
- name: Add neovim PPA
  shell: |
    add-apt-repository ppa:neovim-ppa/unstable -y
    apt-get update
  as_user: root
  timeout: 5m
  retry:
    attempts: 2
    delay: 5s

- name: Install Ubuntu apt apps
  pkg:
    state: present
    names:
      - gnupg
      - curl
      - clojure
      - rlwrap
      - make
      - cmake
      - dos2unix
      - git
      - graphviz
      - htop
      - imagemagick
      - jq
      - mosh
      - nmap
      - sshfs
      - tldr
      - tmux
      - tor
      - tree
      - wget
      - yamllint
      - unzip
      - neovim
      - ripgrep
      - nodejs
      - yarn
      - npm
      - zsh
      - lua5.1
      - golang-go
      - build-essential
      - python3-pip
      - httpie
      - hexyl
      - ruby-full
      - postgresql-client
      - wl-clipboard
      - watchman
  as_user: root
  timeout: 20m
  retry:
    attempts: 3
    delay: 10s

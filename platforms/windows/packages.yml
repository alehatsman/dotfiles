---
- name: Make sure the apt is updated
  shell: |
    apt-get clean;
    apt-get update;
    apt-get upgrade -y;
  as_user: root
  timeout: 15m
  retries: 3
  retry_delay: 10s

- name: Define basic packages
  vars:
    basic_packages:
      - gnupg
      - software-properties-common
      - curl
      - ca-certificates
      - apt-transport-https

- vars.load: ./ubuntu_packages.yml

- name: Make sure basics are installed
  shell: |
    apt-get install -y {{  basic_packages | join: " " }}
  as_user: root
  timeout: 10m
  retries: 3
  retry_delay: 10s

- name: Make sure keyserver is updated
  shell: |
    apt-key adv --refresh-keys --keyserver keyserver.ubuntu.com
  as_user: root
  when: false
  timeout: 5m

- name: Add neovim repos
  shell: |
    add-apt-repository ppa:neovim-ppa/unstable -y
    apt-get update
  as_user: root
  timeout: 5m
  retries: 2
  retry_delay: 5s

- name: Make sure apps are installed
  shell: |
    apt-get install -y {{  apps | join: " " }}
  as_user: root
  timeout: 20m
  retries: 3
  retry_delay: 10s

---
- name: Make sure the apt is updated
  shell: |
    apt-get clean;
    apt-get update;
    apt-get upgrade -y;
  as_user: root
  timeout: 15m
  retry:
    attempts: 3
    delay: 10s

- name: Define basic + app packages
  vars:
    basic_packages:
      - gnupg
      - software-properties-common
      - curl
      - ca-certificates
      - apt-transport-https
    apps:
      - gnupg
      - curl
      - clojure
      - rlwrap
      - make
      - cmake
      - dos2unix
      - git
      - graphviz
      - htop
      - imagemagick
      - jq
      - mosh
      - nmap
      - sshfs
      - tldr
      - tmux
      - tor
      - tree
      - wget
      - yamllint
      - unzip
      - neovim
      - ripgrep
      - nodejs
      - yarn
      - npm
      - zsh
      - lua5.1
      - golang-go
      - build-essential
      - python3-pip
      - httpie
      - hexyl
      - ruby-full
      - postgresql-client
      - wl-clipboard
      - watchman

- name: Make sure basics are installed
  shell: |
    apt-get install -y {{  basic_packages | join: " " }}
  as_user: root
  timeout: 10m
  retry:
    attempts: 3
    delay: 10s

- name: Make sure keyserver is updated
  shell: |
    apt-key adv --refresh-keys --keyserver keyserver.ubuntu.com
  as_user: root
  when: false
  timeout: 5m

- name: Add neovim repos
  shell: |
    add-apt-repository ppa:neovim-ppa/unstable -y
    apt-get update
  as_user: root
  timeout: 5m
  retry:
    attempts: 2
    delay: 5s

- name: Make sure apps are installed
  shell: |
    apt-get install -y {{  apps | join: " " }}
  as_user: root
  timeout: 20m
  retry:
    attempts: 3
    delay: 10s

---
# WSL-specific provisioning. Runs INSIDE the WSL Ubuntu distro.
#
# Cross-environment packages (git, tmux, htop, build-essential, etc.) are
# installed by packages/main.yml — those aren't WSL-specific.
#
# Host-side bits (.wslconfig, firewall rule, scheduled task) are owned by
# platforms/windows/bootstrap.yml — those run on the Windows host, not here.

# Deploy /etc/wsl.conf — enables systemd so services survive WSL restarts.
# Note: changes take effect after 'wsl --shutdown' + reconnect.
- name: Deploy /etc/wsl.conf
  file.template:
    src: ./templates/wsl.conf.j2
    dest: /etc/wsl.conf
  as_user: root

# Just the WSL-only piece — the SSH server that lets the Windows host reach
# this guest. Everything else common (git, tmux, htop, ...) comes from
# packages/ubuntu_packages.yml.
- name: Install openssh-server
  shell: |
    apt-get update && apt-get install -y openssh-server
  as_user: root
  timeout: 10m
  retries: 3
  retry_delay: 10s

# Drop-in config avoids clobbering the base sshd_config
- name: Configure SSH server
  shell: mkdir -p /etc/ssh/sshd_config.d
  as_user: root

- name: Deploy SSH server config
  file.template:
    src: ./templates/sshd_config.j2
    dest: /etc/ssh/sshd_config.d/wsl.conf
  as_user: root

# WSL2 mirrored networking shares the Windows host's port 22 binding (the
# host's OpenSSH listens there for cross-machine SSH). Ubuntu's default
# ssh.socket also wants 0.0.0.0:22, so the bind collides and ssh.service
# fails its socket dependency. Disable ssh.socket and let ssh.service own
# the listener on port 2222 (from our drop-in above).
- name: Disable ssh.socket (conflicts with port 22 under mirrored networking)
  shell: |
    if systemctl list-unit-files ssh.socket >/dev/null 2>&1; then
      systemctl disable --now ssh.socket 2>&1 | grep -v "Removed\|not loaded" || true
    fi
  as_user: root

- name: Enable and start SSH
  shell: |
    if [ "$(ps -p 1 -o comm= 2>/dev/null)" = "systemd" ]; then
      systemctl enable ssh
      systemctl restart ssh
    else
      echo "WARNING: systemd not running — run 'wsl --shutdown' then reconnect, then re-run provisioning"
    fi
  as_user: root

# GPU tooling. nvtop is a small Vulkan/NVIDIA monitor; CUDA is the heavy
# toolkit (multi-GB, ~30 min on first install). Both are skipped on
# machines without an NVIDIA GPU.
- name: Install GPU tooling (nvtop + CUDA, if NVIDIA GPU present)
  shell: |
    if ! lspci 2>/dev/null | grep -qi nvidia; then
      echo "No NVIDIA GPU detected — skipping GPU tooling"
      exit 0
    fi
    apt-get install -y nvtop
    if ! command -v nvcc &>/dev/null; then
      UBUNTU_VER=$(lsb_release -sr | tr -d '.')
      wget "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${UBUNTU_VER}/x86_64/cuda-keyring_1.1-1_all.deb" \
        -O /tmp/cuda-keyring.deb
      dpkg -i /tmp/cuda-keyring.deb
      apt-get update
      apt-get install -y cuda-toolkit
      rm -f /tmp/cuda-keyring.deb
    else
      echo "CUDA already installed: $(nvcc --version | head -1)"
    fi
  as_user: root
  timeout: 45m

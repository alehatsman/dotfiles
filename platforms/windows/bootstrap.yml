---
# Windows host bootstrap — replaces the old bootstrap.ps1.
#
# Run from an Administrator PowerShell on a fresh Windows 11 box:
#   mooncake.exe apply -c platforms/windows/bootstrap.yml -v variables.yml
#
# After this finishes: reboot, finish Ubuntu first-run setup, then run
# mooncake apply -c main.yml -v variables.yml from inside WSL.
#
# Idempotency: each step's inner PowerShell script does its own "if not
# present" check, so re-running is safe. (Mooncake's shell action will
# still report changed=true; that's a cosmetic issue, not a correctness one.)

- name: Set computer name
  shell:
    interpreter: powershell
    run_as_admin: true
    cmd: |
      if ($env:COMPUTERNAME -eq "{{ computer_name }}") {
        Write-Host "Computer name already set to {{ computer_name }}"
      } else {
        Write-Host "Renaming computer to {{ computer_name }} (takes effect after reboot)"
        Rename-Computer -NewName "{{ computer_name }}" -Force
      }

- name: Set WSL default version to 2
  shell:
    cmd: wsl --set-default-version 2
    run_as_admin: true

- name: Install Ubuntu in WSL (if no Ubuntu* distro is present)
  shell:
    interpreter: powershell
    run_as_admin: true
    cmd: |
      # wsl --list output is UTF-16 with embedded NULs — strip them before
      # matching so PowerShell's -match works against ASCII.
      $distros = (wsl --list --quiet 2>$null) -replace "`0", ""
      if ($distros -match "Ubuntu") {
        Write-Host "Ubuntu* distro already installed — skipping wsl --install"
      } else {
        Write-Host "Installing {{ wsl_distro }}..."
        wsl --install -d {{ wsl_distro }}
      }

# Fast Startup ("hybrid shutdown") hibernates the kernel on shutdown
# instead of doing a clean boot next time. It's a known source of WSL2
# instability — the virtual switch state survives across "boots" and
# WSL ends up in a weird partial-init state. Disabling it makes Windows
# do a real cold boot every time, which is what WSL expects.
# HiberbootEnabled=0 disables Fast Startup but keeps hibernate (S4)
# available for manual use.
- name: Disable Windows Fast Startup (HiberbootEnabled=0) for stable WSL boot
  shell:
    interpreter: powershell
    run_as_admin: true
    cmd: |
      $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Power'
      $cur = (Get-ItemProperty -Path $key -Name HiberbootEnabled -ErrorAction SilentlyContinue).HiberbootEnabled
      if ($cur -eq 0) {
        Write-Host "Fast Startup already disabled"
      } else {
        Write-Host "Disabling Fast Startup (was: $cur)"
        Set-ItemProperty -Path $key -Name HiberbootEnabled -Value 0 -Type DWord
      }

# Disable sleep and hibernate on AC power so WSL daemons (ssh, dex-serve,
# ollama, agentd) stay reachable 24/7. Only runs when windows_prevent_sleep
# is true (server boxes); laptops keep their own policy.
- name: Disable sleep and hibernate on AC power
  shell:
    interpreter: powershell
    run_as_admin: true
    cmd: |
      # Never sleep on AC
      $acSleep = (powercfg /query SCHEME_CURRENT SUB_SLEEP STANDBYIDLE |
                  Select-String "Current AC Power Setting Index" |
                  ForEach-Object { ($_ -split '\s+')[-1] })
      if ($acSleep -eq '0x00000000') {
        Write-Host "AC sleep already disabled"
      } else {
        Write-Host "Disabling AC sleep (was $acSleep)"
        powercfg /change standby-timeout-ac 0
      }
      # Never hibernate on AC
      $acHib = (powercfg /query SCHEME_CURRENT SUB_SLEEP HIBERNATEIDLE |
                Select-String "Current AC Power Setting Index" |
                ForEach-Object { ($_ -split '\s+')[-1] })
      if ($acHib -eq '0x00000000') {
        Write-Host "AC hibernate already disabled"
      } else {
        Write-Host "Disabling AC hibernate (was $acHib)"
        powercfg /change hibernate-timeout-ac 0
      }
      # Disable hibernate file entirely (frees disk; machine stays on AC)
      $hibEnabled = (powercfg /availablesleepstates 2>$null) -match "Hibernate:\s+Available"
      if (-not $hibEnabled) {
        Write-Host "Hibernate already off"
      } else {
        Write-Host "Disabling hibernate"
        powercfg /hibernate off
      }
  when: windows_prevent_sleep
  tags: [power, always-on]

# Default OpenSSH server shell on Windows is cmd.exe, which makes any
# remote PowerShell call go through a layer of cmd quoting hell. Set it
# to powershell.exe so SSH lands directly in PowerShell — friendlier for
# both interactive recovery and automation (e.g. driving mooncake over
# the :22 channel when WSL is down).
- name: Set Windows OpenSSH default shell to PowerShell
  shell:
    interpreter: powershell
    run_as_admin: true
    cmd: |
      $key = 'HKLM:\SOFTWARE\OpenSSH'
      $want = 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'
      if (-not (Test-Path $key)) {
        Write-Host "OpenSSH registry key missing — install Windows OpenSSH server first; skipping"
      } else {
        $cur = (Get-ItemProperty -Path $key -Name DefaultShell -ErrorAction SilentlyContinue).DefaultShell
        if ($cur -eq $want) {
          Write-Host "OpenSSH DefaultShell already set to PowerShell"
        } else {
          Write-Host "Setting OpenSSH DefaultShell (was: '$cur')"
          New-ItemProperty -Path $key -Name DefaultShell -Value $want -PropertyType String -Force | Out-Null
        }
      }

- name: Deploy .wslconfig to the Windows user home
  file.template:
    src: ./templates/wslconfig.j2
    dest: "{{ user_home }}/.wslconfig"

- name: Add firewall rule for WSL SSH
  windows.firewall_rule:
    name: "WSL2 SSH"
    description: "WSL guest SSH (mirrored networking exposes the port on the host NIC)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_ssh_port }}"]
    profile: [domain, private]

# With networkingMode=mirrored + firewall=true in .wslconfig, the WSL VM
# sits behind the Hyper-V Firewall — a separate stack from the regular
# Windows Firewall. The native action below opens the host's NICs;
# the Hyper-V rule below opens the VM boundary. Both are required.
- name: Add Hyper-V firewall rule for WSL SSH
  windows.hyperv_firewall_rule:
    name: "WSL2 SSH"
    description: "WSL guest SSH (Hyper-V VM boundary; mirrored networking)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_ssh_port }}"]
    # vm_creator_id defaults to "auto": discovers WSL's GUID via
    # Get-NetFirewallHyperVVMCreator at apply time, with a fallback
    # constant ({40E0AC32-…}) for fresh boxes pre-first-VM-boot.

- name: Add firewall rule for WSL mooncake agentd
  windows.firewall_rule:
    name: "WSL2 Mooncake Agentd"
    description: "WSL Linux agentd (port exposed via mirrored networking)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_agentd_port }}"]
    profile: [domain, private]

- name: Add Hyper-V firewall rule for WSL mooncake agentd
  windows.hyperv_firewall_rule:
    name: "WSL2 Mooncake Agentd"
    description: "WSL Linux agentd (Hyper-V VM boundary)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_agentd_port }}"]

# moongit server: moongitd binds *:8080 inside WSL; mirrored networking
# exposes it on the host NIC, so other boxes on the LAN can hit
# http://<this-pc-ip>:8080 directly — no `ssh -L` tunnel (which coalesces
# the SSE transcript stream). Same two-rule shape as SSH/agentd above:
# the WinFW rule opens the host's NICs, the Hyper-V rule opens the VM
# boundary. Both required under networkingMode=mirrored + firewall=true.
- name: Add firewall rule for WSL moongit
  windows.firewall_rule:
    name: "WSL2 moongit"
    description: "WSL moongit server (port exposed via mirrored networking)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_moongit_port }}"]
    profile: [domain, private]
  # Tagged so a fleet/local apply can target just these two rules without
  # re-running the whole host bootstrap: --step-filter tag=moongit
  # (fleet) or -t moongit (local mooncake.exe apply).
  tags: [moongit, firewall]

- name: Add Hyper-V firewall rule for WSL moongit
  windows.hyperv_firewall_rule:
    name: "WSL2 moongit"
    description: "WSL moongit server (Hyper-V VM boundary; mirrored networking)"
    direction: inbound
    protocol: tcp
    local_port: ["{{ wsl_moongit_port }}"]
  tags: [moongit, firewall]

# ---- Mooncake agentd on the Windows host: HANDLED BY THE CONTROLLER ------
#
# Earlier versions of this file deployed mooncake.exe to
# %LOCALAPPDATA%\Mooncake\bin, opened the agentd port in the Windows
# Firewall, registered a Mooncake-Agentd-Autostart scheduled task, and
# kick-started agentd. All of that is now done by:
#
#   mooncake fleet bootstrap aleh@<this-pc-ip> --port 22 \
#       --agentd-port {{ windows_agentd_port }} --name <machine>-win --tag windows
#
# Run from any controller (x1 / mac / mini_pc) that has mooncake
# installed. spec-56 added the Windows branch to fleet bootstrap; the
# rendered scheduled task uses the same `Mooncake-Agentd-Autostart`
# name + S4U principal as the old dotfiles step, so a peer
# bootstrapped pre-spec-56 looks identical to one bootstrapped after.
# The peer's token + addr land in ~/.config/mooncake/peers.toml
# directly on the controller — no copy-paste hint here.
#
# Why move it out: keeping the install path in one place across
# linux/darwin/windows targets means a single bug-fix (e.g. token
# rotation, idempotent re-register) touches mooncake, not every
# consumer's dotfiles. See spec-56 §"Motivation" for the full case.

# Belt-and-suspenders to vmIdleTimeout=-1 in .wslconfig: a repeating
# scheduled task that re-runs `systemctl start ssh` every 5 minutes. It's
# a fast no-op when sshd is already running, and the wsl.exe invocation
# itself wakes a stopped VM. Runs as the current user (not SYSTEM) so the
# user's registered WSL distros are visible. S4U logon means the task
# fires even when the user isn't logged in.
- name: Register Task Scheduler entry to keep WSL SSH alive
  windows.scheduled_task:
    name: WSL2-SSH-Keepalive
    description: "Wake WSL VM + ensure ssh service is up (5-minute repetition)"
    triggers:
      - type: repetition
        interval: 5m
    actions:
      - execute: 'C:\Windows\System32\wsl.exe'
        arguments: '-d {{ wsl_distro }} -u root -- systemctl start ssh'
    principal:
      # {{ username }} on Windows resolves to DOMAIN\USER from
      # user.Current() — matches the COMPUTERNAME\USERNAME form the
      # old PowerShell version used and the agentd autostart task
      # mooncake fleet bootstrap registers.
      user: "{{ username }}"
      logon_type: s4u
      run_level: highest
    settings:
      execution_time_limit: 2m
      allow_start_if_on_batteries: true
      dont_stop_if_going_on_batteries: true
      start_when_available: true

# Windows re-marks the LAN as Public (Unidentified) on most boots, and the
# fleet firewall rules above are scoped Domain,Private only (opening a
# control-plane daemon on Public is unsafe — mooncake #118). The net effect
# without this: every fleet port (:2222/:7878/:7879/:8080) is filtered after
# a reboot until someone sets the profile Private by hand. This boot task
# flips any Public profile back to Private so the rules apply. Interface
# index changes across boots, so match by category, not index.
- name: Register Task Scheduler entry to pin LAN profile Private at boot
  windows.scheduled_task:
    name: Set-Network-Private
    description: "Reclassify any Public connection profile to Private at boot (fleet rules are Domain,Private)"
    triggers:
      - type: boot
    actions:
      - execute: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'
        arguments: >-
          -NoProfile -Command "Get-NetConnectionProfile |
          Where-Object { $_.NetworkCategory -eq 'Public' } |
          Set-NetConnectionProfile -NetworkCategory Private"
    principal:
      user: "{{ username }}"
      logon_type: s4u
      run_level: highest
    settings:
      execution_time_limit: 2m
      allow_start_if_on_batteries: true
      dont_stop_if_going_on_batteries: true
      start_when_available: true

# vmIdleTimeout=-1 in .wslconfig prevents idle-based shutdown but NOT
# session-based shutdown: WSL exits when the last wsl.exe session closes,
# regardless of timeout. On always-on server boxes (windows_prevent_sleep)
# a persistent boot task holds a session open so all services stay reachable.
# Same shape as WSL-Network-Keepalive (NAT mode) but unconditional on
# networking mode — mirrored-networking boxes need this too.
- name: Register WSL session keepalive task (always-on)
  windows.scheduled_task:
    name: WSL-Session-Keepalive
    description: "Persistent wsl session so WSL2 never exits on session-based shutdown (server boxes)"
    triggers:
      - type: boot
    actions:
      - execute: 'C:\Windows\System32\wsl.exe'
        arguments: '-d {{ wsl_distro }} -u root -- sleep infinity'
    principal:
      user: "{{ username }}"
      logon_type: s4u
      run_level: highest
    settings:
      execution_time_limit: "0"
      restart_count: 999
      restart_interval: 1m
      allow_start_if_on_batteries: true
      dont_stop_if_going_on_batteries: true
      start_when_available: true
  when: windows_prevent_sleep
  tags: [wsl, windows, always-on]

- name: Print next steps
  log:
    msg: |
      Windows host bootstrap complete. Next steps:
        1. Reboot the machine (picks up scheduled tasks + WSL changes cleanly)
        2. Finish Ubuntu first-run setup (set username + password)
        3. Inside WSL, clone dotfiles + apply the per-machine entry:
             git clone https://github.com/alehatsman/dotfiles ~/dotfiles
             cd ~/dotfiles && bash scripts/install_mooncake.sh
             mooncake apply -c ./<this-machine>.yml
        4. Add your SSH public key to ~/.ssh/authorized_keys (WSL side)
        5. wsl --shutdown, then verify: ssh <this-pc-ip> -p {{ wsl_ssh_port }}
        6. From your controller machine (e.g. x1), bootstrap BOTH agentd
           daemons — one inside the WSL distro, one on the Windows host.
           Each command SCPs the right mooncake binary, installs the
           OS-native autostart (systemd unit on Linux, Task Scheduler
           entry on Windows), opens the firewall, and writes the peer
           entry to peers.toml.

           # WSL (Linux) peer — goes through WSL's OpenSSH on :{{ wsl_ssh_port }}
             mooncake fleet bootstrap <user>@<this-pc-ip> \
                 --port {{ wsl_ssh_port }} --agentd-port {{ wsl_agentd_port }} \
                 --name <machine> --tag <machine> --upgrade

           # Windows-host peer — goes through Windows OpenSSH on :22
             mooncake fleet bootstrap <user>@<this-pc-ip> \
                 --port 22 --agentd-port {{ windows_agentd_port }} \
                 --name <machine>-win --tag windows --upgrade

        7. Confirm both peers green:
             mooncake fleet status
           Expect: 2/2 accessible, <machine> (linux) + <machine>-win (windows).

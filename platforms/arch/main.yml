---
- name: Update pacman mirrors and upgrade system
  pkg:
    manager: pacman
    upgrade: true
  as_user: root
  timeout: 15m
  retries: 3
  retry_delay: 10s
  tags: [arch, system, packages]

- name: Enable multilib repository
  shell: |
    if ! grep -q '^\[multilib\]' /etc/pacman.conf; then
      sed -i '/^#\[multilib\]/{s/^#//;n;s/^#//}' /etc/pacman.conf
      pacman -Sy --noconfirm
    fi
  as_user: root
  tags: [arch, system, packages]

- name: Install base-devel and git
  pkg:
    manager: pacman
    state: present
    names:
      - base-devel
      - git
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Build yay AUR helper
  shell: |
    if ! pacman -Qi yay > /dev/null 2>&1; then
      tmpdir=$(mktemp -d)
      git clone https://aur.archlinux.org/yay.git "$tmpdir/yay"
      cd "$tmpdir/yay" && makepkg -s --noconfirm
      echo "$tmpdir/yay" > /tmp/.yay_build_dir
    else
      echo "" > /tmp/.yay_build_dir
    fi
  timeout: 10m
  tags: [arch, system, packages]

- name: Install yay AUR helper
  shell: |
    build_dir=$(cat /tmp/.yay_build_dir)
    rm -f /tmp/.yay_build_dir
    if [ -n "$build_dir" ]; then
      pacman -U --noconfirm "$build_dir"/yay-*.pkg.tar.zst
      rm -rf "$build_dir"
    fi
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Configure passwordless sudo for user
  shell: |
    echo "{{ OS_USERNAME }} ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/{{ OS_USERNAME }}-nopasswd
    chmod 440 /etc/sudoers.d/{{ OS_USERNAME }}-nopasswd
  as_user: root
  tags: [arch, system, packages]

- import: ./packages.yml
  tags: [arch, system, packages]

- name: Enable NetworkManager
  shell: systemctl enable --now NetworkManager
  as_user: root
  tags: [arch, system, packages]

- name: Enable TLP for battery management
  shell: systemctl enable --now tlp
  as_user: root
  tags: [arch, system, packages]

- name: Enable bluetooth
  shell: systemctl enable --now bluetooth
  as_user: root
  tags: [arch, system, packages]

- name: Enable SSH daemon
  shell: systemctl enable --now sshd
  as_user: root
  tags: [arch, system, packages]

- name: Enable firmware update timer
  shell: systemctl enable --now fwupd-refresh.timer
  as_user: root
  tags: [arch, system, packages]

- name: Enable ollama service
  shell: systemctl enable --now ollama
  as_user: root
  tags: [arch, system, packages]

- name: Set default shell to zsh
  shell: chsh -s $(which zsh) {{ OS_USERNAME }}
  as_user: root
  tags: [arch, system, packages]

- name: Set TLP platform_profile to balanced
  file.write:
    path: /etc/tlp.d/01-platform-profile.conf
    state: file
    content: |
      # Hold the firmware ACPI profile at "balanced" so the fan curve
      # and power limits don't drift back to "performance" across boots
      # or service restarts.
      PLATFORM_PROFILE_ON_AC=balanced
      PLATFORM_PROFILE_ON_BAT=balanced
    mode: '0644'
  as_user: root
  tags: [arch, system, packages]

- name: Drop TLP cooling tweaks (capped turbo, deeper EPP, ASPM, runtime PM)
  file.write:
    path: /etc/tlp.d/02-cool.conf
    state: file
    content: |
      # Cooling tweaks for X1 Carbon Gen 13 / Ultra 7 255U.
      # Goal: cold + quiet, perf not a priority. Combine with the
      # RAPL PL1/PL2 caps from the intel-rapl-cap.service unit.

      # Cap clock ceiling — turbo still works but bounded.
      CPU_MIN_PERF_ON_AC=0
      CPU_MAX_PERF_ON_AC=80
      CPU_MIN_PERF_ON_BAT=0
      CPU_MAX_PERF_ON_BAT=60

      # Tell HWP to prefer power over performance at every decision.
      CPU_ENERGY_PERF_POLICY_ON_AC=power
      CPU_ENERGY_PERF_POLICY_ON_BAT=power

      # Disable HWP's autonomous opportunistic boost.
      CPU_HWP_DYN_BOOST_ON_AC=0
      CPU_HWP_DYN_BOOST_ON_BAT=0

      # Aggressive PCIe ASPM — biggest idle-watt reduction.
      PCIE_ASPM_ON_AC=powersupersave
      PCIE_ASPM_ON_BAT=powersupersave

      # Runtime PM + USB autosuspend on everywhere.
      RUNTIME_PM_ON_AC=auto
      RUNTIME_PM_ON_BAT=auto
      USB_AUTOSUSPEND=1

      # WiFi power-save always on (free idle wattage).
      WIFI_PWR_ON_AC=on
      WIFI_PWR_ON_BAT=on

      # Let the scheduler park work on LP-E cores.
      SCHED_POWERSAVE_ON_AC=1
      SCHED_POWERSAVE_ON_BAT=1

      # Stop NMI watchdog from waking every CPU constantly.
      NMI_WATCHDOG=0
    mode: '0644'
  as_user: root
  tags: [arch, system, packages]

- name: Apply TLP config
  shell: tlp start
  as_user: root
  tags: [arch, system, packages]

- name: Append i915 power-save params to systemd-boot cmdline
  shell: |
    ENTRY=/boot/loader/entries/arch.conf
    PARAMS="i915.enable_fbc=1 i915.enable_psr=1 i915.enable_dc=4 nmi_watchdog=0"
    [ -f "$ENTRY" ] || { echo "boot entry not found, skipping"; exit 0; }
    if ! grep -q 'i915.enable_fbc' "$ENTRY"; then
      sed -i "s|^options |options $PARAMS |" "$ENTRY"
      echo "added: $PARAMS"
    else
      echo "already present"
    fi
  as_user: root
  tags: [arch, system, packages, bootloader]

- name: Deploy intel-rapl-cap script (PL1=12W, PL2=25W)
  file.write:
    path: /usr/local/bin/intel-rapl-cap
    state: file
    content: |
      #!/bin/sh
      # Cap Intel RAPL power limits — PL1 sustained, PL2 brief burst.
      # 12W sustained keeps the fan at minimum; 25W burst preserves snap
      # without ever letting the package draw 57W like firmware allows.
      PL1_UW=12000000
      PL2_UW=25000000
      RAPL=/sys/class/powercap/intel-rapl/intel-rapl:0
      [ -d "$RAPL" ] || exit 0
      echo "$PL1_UW" > "$RAPL/constraint_0_power_limit_uw" 2>/dev/null || true
      echo "$PL2_UW" > "$RAPL/constraint_1_power_limit_uw" 2>/dev/null || true
    mode: '0755'
  as_user: root
  tags: [arch, system, packages, rapl]

- name: Deploy intel-rapl-cap.service (apply at boot)
  file.write:
    path: /etc/systemd/system/intel-rapl-cap.service
    state: file
    content: |
      [Unit]
      Description=Cap Intel RAPL power limits (PL1/PL2) for thermals
      After=multi-user.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/intel-rapl-cap

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  as_user: root
  tags: [arch, system, packages, rapl]

- name: Deploy intel-rapl-cap-resume.service (re-apply after suspend)
  file.write:
    path: /etc/systemd/system/intel-rapl-cap-resume.service
    state: file
    content: |
      [Unit]
      Description=Re-apply Intel RAPL caps after resume
      After=suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/intel-rapl-cap

      [Install]
      WantedBy=suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target
    mode: '0644'
  as_user: root
  tags: [arch, system, packages, rapl]

- name: Enable and start intel-rapl-cap services
  shell: |
    systemctl daemon-reload
    systemctl enable --now intel-rapl-cap.service
    systemctl enable intel-rapl-cap-resume.service
  as_user: root
  tags: [arch, system, packages, rapl]

- name: Remap CapsLock to Ctrl and keep in lowercase mode
  shell: |
    mkdir -p /usr/local/share/kbd/keymaps
    printf 'include "/usr/share/kbd/keymaps/i386/qwerty/us.map.gz"\nkeycode 58 = Control\n' \
      > /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    if grep -q '^KEYMAP=' /etc/vconsole.conf 2>/dev/null; then
      sed -i 's|^KEYMAP=.*|KEYMAP=/usr/local/share/kbd/keymaps/us-caps-ctrl.map|' /etc/vconsole.conf
    else
      echo 'KEYMAP=/usr/local/share/kbd/keymaps/us-caps-ctrl.map' >> /etc/vconsole.conf
    fi
    localectl set-x11-keymap us "" "" ctrl:nocaps
    loadkeys /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    # Keep CapsLock LED always off (lowercase mode)
    echo 'ACTION=="add", SUBSYSTEM=="leds", KERNEL=="input*::capslock", ATTR{brightness}="0"' \
      > /etc/udev/rules.d/99-capslock-led.rules
    echo 0 > /sys/class/leds/input3::capslock/brightness 2>/dev/null || true
  as_user: root
  tags: [arch, system, packages]

---
- name: Update pacman mirrors and upgrade system
  pkg:
    manager: pacman
    upgrade: true
  as_user: root
  timeout: 15m
  retry:
    attempts: 3
    delay: 10s
  tags: [arch, system, packages]

- name: Enable multilib repository (uncomment block in pacman.conf)
  # Stock pacman.conf ships these two lines commented:
  #   #[multilib]
  #   #Include = /etc/pacman.d/mirrorlist
  # text.replace uncomments both atomically. Idempotent: a second run
  # finds neither commented line and (with allow_no_match) is a no-op.
  text.replace:
    path: /etc/pacman.conf
    pattern: |
      #[multilib]
      #Include = /etc/pacman.d/mirrorlist
    replace: |
      [multilib]
      Include = /etc/pacman.d/mirrorlist
    allow_no_match: true
    flags:
      regex: false
  as_user: root
  tags: [arch, system, packages]

- name: Install base-devel and git (refreshes pacman db too)
  # update_cache: true subsumes the explicit `pacman -Sy --noconfirm`
  # that previously chased the multilib enable above.
  pkg:
    manager: pacman
    state: present
    update_cache: true
    names:
      - base-devel
      - git
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Build yay AUR helper
  shell: |
    if ! pacman -Qi yay > /dev/null 2>&1; then
      tmpdir=$(mktemp -d)
      git clone https://aur.archlinux.org/yay.git "$tmpdir/yay"
      cd "$tmpdir/yay" && makepkg -s --noconfirm
      echo "$tmpdir/yay" > /tmp/.yay_build_dir
    else
      echo "" > /tmp/.yay_build_dir
    fi
  timeout: 10m
  tags: [arch, system, packages]

- name: Install yay AUR helper
  shell: |
    build_dir=$(cat /tmp/.yay_build_dir)
    rm -f /tmp/.yay_build_dir
    if [ -n "$build_dir" ]; then
      pacman -U --noconfirm "$build_dir"/yay-*.pkg.tar.zst
      rm -rf "$build_dir"
    fi
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Configure passwordless sudo for user
  file.write:
    path: /etc/sudoers.d/{{ username }}-nopasswd
    state: file
    content: |
      {{ username }} ALL=(ALL) NOPASSWD: ALL
    mode: '0440'
  as_user: root
  tags: [arch, system, packages]

- import: ./packages.yml
  tags: [arch, system, packages]

- name: Enable NetworkManager
  os.service:
    name: NetworkManager
    state: started
    enabled: true
  as_user: root
  tags: [arch, system, packages]

- name: Enable TLP for battery management
  os.service:
    name: tlp
    state: started
    enabled: true
  as_user: root
  tags: [arch, system, packages]

- name: Enable bluetooth
  os.service:
    name: bluetooth
    state: started
    enabled: true
  as_user: root
  tags: [arch, system, packages]

- name: Enable SSH daemon
  os.service:
    name: sshd
    state: started
    enabled: true
  as_user: root
  tags: [arch, system, packages]

- name: Enable firmware update timer
  os.service:
    name: fwupd-refresh.timer
    state: started
    enabled: true
  as_user: root
  tags: [arch, system, packages]

- name: Set default shell to zsh
  os.user:
    name: "{{ username }}"
    shell: /usr/bin/zsh
  as_user: root
  tags: [arch, system, packages]

- name: Make Intel RAPL energy_uj readable by non-root (waybar power module)
  shell: |
    cat > /etc/udev/rules.d/99-rapl-readable.rules <<'EOF'
    ACTION=="add", SUBSYSTEM=="powercap", KERNEL=="intel-rapl:*", RUN+="/usr/bin/chmod 0444 /sys%p/energy_uj"
    EOF
    # Apply now for already-loaded RAPL domains (udev only fires on add).
    for f in /sys/class/powercap/intel-rapl:*/energy_uj; do
      [ -e "$f" ] && chmod 0444 "$f" || true
    done
  as_user: root
  tags: [arch, system, packages, rapl]

# CapsLock → Ctrl remap, decomposed from a single shell block into
# declarative pieces. The runtime-apply commands (localectl, loadkeys,
# /sys/class/leds poke) stay shell because they're one-shot effects
# with no idempotency surface to check against.

- name: Create kbd keymaps directory
  file.write:
    path: /usr/local/share/kbd/keymaps
    state: directory
  as_user: root
  tags: [arch, system, packages]

- name: Deploy us-caps-ctrl keymap (CapsLock acts as Control)
  file.write:
    path: /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    state: file
    content: |
      include "/usr/share/kbd/keymaps/i386/qwerty/us.map.gz"
      keycode 58 = Control
    mode: '0644'
  as_user: root
  tags: [arch, system, packages]

- name: Set KEYMAP in /etc/vconsole.conf
  # text.line replaces an existing KEYMAP= line (anchored by regexp)
  # or appends one if absent. Idempotent on both branches of the
  # pre-fix shell.
  text.line:
    path: /etc/vconsole.conf
    line: KEYMAP=/usr/local/share/kbd/keymaps/us-caps-ctrl.map
    regexp: '^KEYMAP='
    state: present
  as_user: root
  tags: [arch, system, packages]

- name: Deploy udev rule keeping CapsLock LED off
  file.write:
    path: /etc/udev/rules.d/99-capslock-led.rules
    state: file
    content: |
      ACTION=="add", SUBSYSTEM=="leds", KERNEL=="input*::capslock", ATTR{brightness}="0"
    mode: '0644'
  as_user: root
  tags: [arch, system, packages]

- name: Apply CapsLock remap to running session (best-effort)
  # localectl + loadkeys + the sysfs poke are one-shot apply-now
  # commands; nothing to check declaratively. They're idempotent in
  # spirit — each just re-affirms what the config files above persist.
  shell: |
    localectl set-x11-keymap us "" "" ctrl:nocaps
    loadkeys /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    echo 0 > /sys/class/leds/input3::capslock/brightness 2>/dev/null || true
  as_user: root
  tags: [arch, system, packages]

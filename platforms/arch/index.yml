---
- name: Update pacman mirrors and upgrade system
  pkg:
    manager: pacman
    upgrade: true
  as_user: root
  timeout: 15m
  retries: 3
  retry_delay: 10s
  tags: [arch, system, packages]

- name: Enable multilib repository
  shell: |
    if ! grep -q '^\[multilib\]' /etc/pacman.conf; then
      sed -i '/^#\[multilib\]/{s/^#//;n;s/^#//}' /etc/pacman.conf
      pacman -Sy --noconfirm
    fi
  as_user: root
  tags: [arch, system, packages]

- name: Install base-devel and git
  pkg:
    manager: pacman
    state: present
    names:
      - base-devel
      - git
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Build yay AUR helper
  shell: |
    if ! pacman -Qi yay > /dev/null 2>&1; then
      tmpdir=$(mktemp -d)
      git clone https://aur.archlinux.org/yay.git "$tmpdir/yay"
      cd "$tmpdir/yay" && makepkg -s --noconfirm
      echo "$tmpdir/yay" > /tmp/.yay_build_dir
    else
      echo "" > /tmp/.yay_build_dir
    fi
  timeout: 10m
  tags: [arch, system, packages]

- name: Install yay AUR helper
  shell: |
    build_dir=$(cat /tmp/.yay_build_dir)
    rm -f /tmp/.yay_build_dir
    if [ -n "$build_dir" ]; then
      pacman -U --noconfirm "$build_dir"/yay-*.pkg.tar.zst
      rm -rf "$build_dir"
    fi
  as_user: root
  timeout: 5m
  tags: [arch, system, packages]

- name: Configure passwordless sudo for user
  shell: |
    echo "{{ username }} ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/{{ username }}-nopasswd
    chmod 440 /etc/sudoers.d/{{ username }}-nopasswd
  as_user: root
  tags: [arch, system, packages]

- import: ./packages.yml
  tags: [arch, system, packages]

- name: Enable NetworkManager
  shell: systemctl enable --now NetworkManager
  as_user: root
  tags: [arch, system, packages]

- name: Enable TLP for battery management
  shell: systemctl enable --now tlp
  as_user: root
  tags: [arch, system, packages]

- name: Enable bluetooth
  shell: systemctl enable --now bluetooth
  as_user: root
  tags: [arch, system, packages]

- name: Enable SSH daemon
  shell: systemctl enable --now sshd
  as_user: root
  tags: [arch, system, packages]

- name: Enable firmware update timer
  shell: systemctl enable --now fwupd-refresh.timer
  as_user: root
  tags: [arch, system, packages]

- name: Set default shell to zsh
  shell: chsh -s $(which zsh) {{ username }}
  as_user: root
  tags: [arch, system, packages]

- name: Remap CapsLock to Ctrl and keep in lowercase mode
  shell: |
    mkdir -p /usr/local/share/kbd/keymaps
    printf 'include "/usr/share/kbd/keymaps/i386/qwerty/us.map.gz"\nkeycode 58 = Control\n' \
      > /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    if grep -q '^KEYMAP=' /etc/vconsole.conf 2>/dev/null; then
      sed -i 's|^KEYMAP=.*|KEYMAP=/usr/local/share/kbd/keymaps/us-caps-ctrl.map|' /etc/vconsole.conf
    else
      echo 'KEYMAP=/usr/local/share/kbd/keymaps/us-caps-ctrl.map' >> /etc/vconsole.conf
    fi
    localectl set-x11-keymap us "" "" ctrl:nocaps
    loadkeys /usr/local/share/kbd/keymaps/us-caps-ctrl.map
    # Keep CapsLock LED always off (lowercase mode)
    echo 'ACTION=="add", SUBSYSTEM=="leds", KERNEL=="input*::capslock", ATTR{brightness}="0"' \
      > /etc/udev/rules.d/99-capslock-led.rules
    echo 0 > /sys/class/leds/input3::capslock/brightness 2>/dev/null || true
  as_user: root
  tags: [arch, system, packages]

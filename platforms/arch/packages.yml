---
- name: Install pacman packages
  pkg:
    manager: pacman
    state: present
    names:
      # System / hardware (ThinkPad X1 Carbon Gen 13 Aura Edition)
      - base-devel
      - intel-ucode
      - tlp
      - tlp-rdw
      - powertop
      - bluez
      - bluez-utils
      - pipewire
      - pipewire-pulse
      - pipewire-alsa
      - wireplumber
      - sof-firmware
      - alsa-firmware
      - alsa-ucm-conf
      - alsa-utils
      - xdg-utils

      # Network
      - networkmanager
      - openssh
      - mosh
      - nmap
      - impala

      # Firmware & hardware management
      - fwupd
      - fprintd

      # Core tools
      - gnupg
      - curl
      - wget
      - git
      - make
      - cmake
      - unzip
      - dos2unix
      - ca-certificates
      - man-db
      - man-pages

      # Shell
      - zsh
      - zsh-syntax-highlighting

      # Terminal tools
      - tmux
      - fzf
      - bat
      - lsd
      - ripgrep
      - fd
      - tree
      - htop
      - btop
      - tig
      - lazygit
      - jq
      - aria2
      - ffmpeg
      - imagemagick
      - graphviz
      - hexyl
      - ninja
      - xclip
      - wl-clipboard
      - shellcheck
      - yamllint
      - reflector
      - rsync
      - socat
      - tcpdump
      - wireshark-cli

      # Data recovery / disk
      - testdisk
      - ddrescue

      # Backup
      - borg
      - restic

      # Editors
      - neovim
      - lua-language-server

      # Development
      - go
      - nodejs
      - npm
      - yarn
      - pyenv
      - clojure
      - rlwrap
      - lua51
      - sqlite

      # Cloud / infra
      - aws-cli

      # Containers
      - podman
      - podman-compose
      - buildah
      - lazydocker

      # Database
      - postgresql
      - redis
      - pgcli

      # Offline / security
      - keepassxc
      - zeal

      # Misc
      - github-cli
      - httpie
      - direnv
      - cliphist
      - network-manager-applet
      - blueman

      # Apps (multilib must be enabled)
      - vlc
      - mpv
      - thunderbird
      - steam
      - swaybg

      # Wayland / Hyprland
      - hyprland
      - waybar
      - wofi
      - dunst
      - hyprpaper
      - hyprlock
      - hypridle
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - qt5-wayland
      - qt6-wayland
      - polkit-gnome
      - grim
      - slurp
      - brightnessctl
      - playerctl
      - pavucontrol
      - hyprsunset
      - gnome-keyring
      - alacritty
      - yazi
      - ttf-jetbrains-mono-nerd
      - noto-fonts
      - noto-fonts-emoji
  as_user: root
  timeout: 20m
  retry:
    attempts: 3
    delay: 10s
  tags: [arch, system, packages]

# AUR packages — kept as shell because mooncake's package action
# does not support yay/paru. Migrate once AUR manager support lands.
- name: Install AUR packages
  shell: |
    yay -S --noconfirm --needed \
      git-delta \
      tealdeer \
      nwg-dock-hyprland \
      bruno-bin \
      shfmt \
      yq \
      code-minimap \
      zoxide \
      tree-sitter-cli \
      google-chrome \
      1password \
      1password-cli \
      spotify \
      spotifyd \
      globalprotect-openconnect \
      bluetuith \
      wlogout
  timeout: 15m
  retry:
    attempts: 2
    delay: 10s
  tags: [arch, system, packages]

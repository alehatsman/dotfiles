---
- name: Make sure xcode is installed
  shell: |
    if ! type "make" > /dev/null 2>&1; then
      xcode-select --install
      exit 0
    fi
    exit 2
  as: xcode_result
  failed_when: result.rc not in [0, 2]
  changed_when: result.rc == 0
  timeout: 10m

- name: Make sure rosetta 2 is installed
  shell: |
    softwareupdate --install-rosetta --agree-to-license
  as_user: root
  as: rosetta_result
  failed_when: result.rc not in [0, 1]
  changed_when: result.rc == 0
  timeout: 10m

- name: Make sure brew is installed
  shell: |
    # Check known install locations directly — mooncake's shell doesn't
    # source .zshrc so /opt/homebrew/bin is not on PATH.
    if test -x /opt/homebrew/bin/brew || test -x /usr/local/bin/brew; then
      exit 2
    fi
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  as: brew_result
  failed_when: result.rc not in [0, 2]
  changed_when: result.rc == 0
  timeout: 10m
  retry:
    attempts: 3
    delay: 10s

- name: Define brew taps, formulae, and casks
  vars:
    # taps are objects rather than strings because mooncake's pkg.repo
    # `name:` field doesn't allow slashes (it's a filesystem label).
    # `tap` keeps the canonical `<owner>/<repo>` brew expects.
    taps:
      - { name: wata727-tflint,       tap: wata727/tflint }
      - { name: borkdude-brew,        tap: borkdude/brew }
      - { name: wagoodman-dive,       tap: wagoodman/dive }
      - { name: adoptopenjdk-openjdk, tap: AdoptOpenJDK/openjdk }
    apps:
      - aria2
      - autoenv
      - autojump
      - aws-iam-authenticator
      - awscli
      - caddy
      - cmake
      - fd
      - fzf
      - gnu-sed
      - graphviz
      - git
      - git-delta
      - htop
      - hub
      - imagemagick
      - jq
      - lastpass-cli
      - libpq
      - mosh
      - nmap
      - packer
      - python
      - ripgrep
      - rustup
      - shellcheck
      - shfmt
      - terraform
      - terraform-inventory
      - tig
      - tldr
      - tree
      - watchman
      - wget
      - xsv
      - yamllint
      - yq
      - clojure
      - leiningen
      - boot-clj
      - clj-kondo
      - dive
      - kubernetes-cli
      - go
      - node
      - nvm
      - yarn
      - tmux
      - reattach-to-user-namespace
      - zsh
      - httpie
      - ninja
      - hexyl
      - gh
      - code-minimap
      - lua-language-server
      - xclip
    cask_apps:
      - adobe-acrobat-reader
      - amazon-workspaces
      - anki
      - docker
      - font-fira-code
      - google-drive
      - google-chrome
      - google-cloud-sdk
      - kap
      - pgadmin4
      - postman
      - slack
      - spectacle
      - telegram
      - transmission
      - tunnelblick
      - veracrypt
      - visual-studio-code
      - vlc
      - xmind
      - zoom
      - font-jetbrains-mono-nerd-font

- name: Register brew taps
  # mooncake's pkg.repo brew driver lists current taps first and only
  # calls `brew tap` on drift — drops the failed_when/changed_when
  # boilerplate the shell version needed for brew's rc=1 on "already
  # tapped" (proposal-08).
  pkg.repo:
    name: "{{ item.name }}"
    state: present
    brew:
      tap: "{{ item.tap }}"
  for_each: "{{ taps }}"
  timeout: 5m

- name: Install brew formulae
  pkg:
    manager: brew
    state: present
    names: "{{ apps }}"
  timeout: 30m
  retry:
    attempts: 2
    delay: 10s

- name: Install brew casks
  pkg:
    manager: brew
    cask: true
    state: present
    names: "{{ cask_apps }}"
  timeout: 30m
  retry:
    attempts: 2
    delay: 10s

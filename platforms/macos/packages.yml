---
- name: Make sure xcode is installed
  shell: |
    if ! type "make" > /dev/null; then
      echo "xcode tools are not installed."
      xcode-select --install
    else
      echo "xcode tools are already installed. Skipping..."
    fi
  as: xcode_result
  changed_when: "'not installed' in xcode_result.stdout"
  timeout: 10m

- name: Make sure rosetta 2 is installed
  shell: |
    softwareupdate --install-rosetta --agree-to-license
  as_user: root
  as: rosetta_result
  failed_when: rosetta_result.rc not in [0, 1]
  changed_when: rosetta_result.rc == 0
  timeout: 10m

- name: Make sure brew is installed
  shell: |
    if ! type "brew" > /dev/null; then
      echo "brew is not installed."
      /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    else
      echo "brew is already installed. Skipping..."
    fi
  as: brew_result
  changed_when: "'not installed' in brew_result.stdout"
  timeout: 10m
  retry:
    attempts: 3
    delay: 10s

- name: Define brew taps, formulae, and casks
  vars:
    taps:
      - wata727/tflint
      - borkdude/brew
      - wagoodman/dive
      - AdoptOpenJDK/openjdk
    apps:
      - aria2
      - autoenv
      - autojump
      - aws-iam-authenticator
      - awscli
      - caddy
      - cmake
      - fd
      - fzf
      - gnu-sed
      - graphviz
      - git
      - git-delta
      - htop
      - hub
      - imagemagick
      - jq
      - lastpass-cli
      - libpq
      - mosh
      - nmap
      - packer
      - python
      - ripgrep
      - rustup
      - shellcheck
      - shfmt
      - terraform
      - terraform-inventory
      - tig
      - tldr
      - tree
      - watchman
      - wget
      - xsv
      - yamllint
      - yq
      - clojure
      - leiningen
      - boot-clj
      - clj-kondo
      - dive
      - kubernetes-cli
      - go
      - node
      - nvm
      - yarn
      - tmux
      - reattach-to-user-namespace
      - zsh
      - httpie
      - ninja
      - hexyl
      - gh
      - code-minimap
      - lua-language-server
      - xclip
    cask_apps:
      - adobe-acrobat-reader
      - amazon-workspaces
      - anki
      - docker
      - font-fira-code
      - google-drive
      - google-chrome
      - google-cloud-sdk
      - kap
      - pgadmin4
      - postman
      - slack
      - spectacle
      - telegram
      - transmission
      - tunnelblick
      - veracrypt
      - visual-studio-code
      - vlc
      - xmind
      - zoom
      - font-jetbrains-mono-nerd-font

- name: Make sure all the taps are present
  shell: |
    brew tap {{ item }}
  for_each: "{{ taps }}"
  as: tap_result
  failed_when: tap_result.rc not in [0, 1]
  changed_when: "'already tapped' not in tap_result.stderr"
  timeout: 5m

- name: Make sure all the apps are present
  shell: |
    brew install {{ apps | join: ' ' }}
  as: apps_result
  failed_when: apps_result.rc not in [0, 1]
  timeout: 30m
  retry:
    attempts: 2
    delay: 10s

- name: Make sure all the cask apps are present
  shell: |
    brew install --cask {{ cask_apps | join: ' ' }}
  as: cask_result
  failed_when: cask_result.rc not in [0, 1]
  timeout: 30m
  retry:
    attempts: 2
    delay: 10s

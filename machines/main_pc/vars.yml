---
# main_pc-specific variables (Windows + WSL Ubuntu).
is_wsl: true
computer_name: main_pc
wsl_distro: "Ubuntu-24.04"
wsl_ssh_port: "2222"
# Mooncake agentd TCP ports.
#   wsl_agentd_port (7878)    — Linux daemon inside the Ubuntu VM.
#                               Mirrored networking exposes it on the
#                               Windows host's LAN IP. Needs BOTH a
#                               Windows Firewall rule AND a Hyper-V
#                               Firewall rule (see bootstrap.yml).
#   windows_agentd_port (7879) — Windows daemon on the host itself.
#                                Only needs the regular WinFW rule.
# Both daemons appear as separate peers in peers.toml for fleet apply.
wsl_agentd_port: "7878"
windows_agentd_port: "7879"

# moongit server (components/moongit, MOONGIT_ADDR=:8080). moongitd binds
# *:8080, so mirrored networking puts it on the Windows host's LAN IP —
# but the Hyper-V VM defaults to DefaultInboundAction=Block, so reaching
# it from another box needs BOTH a Windows Firewall rule AND a Hyper-V
# Firewall rule (see bootstrap.yml), same as wsl_ssh_port/wsl_agentd_port.
# Direct LAN access avoids the SSE-coalescing an `ssh -L 8080` tunnel adds.
wsl_moongit_port: "8080"

# ─── claude — host-specific system prompt ─────────────────────────────────
# main_pc is the fleet's coordination + intel hub: it runs the moongit
# server (components/moongit) and the dex embedding server (dex_role:
# server). Agents here are beta testers of that stack, so they get a slim
# host-specific ~/.claude/CLAUDE.md that mandates mgit issue coordination
# and dex-first code intel instead of the shared trooper prompt. Path is
# resolved relative to components/claude/.
claude_system_prompt_src: "../../machines/main_pc/CLAUDE.md"

# ─── dex — semantic-search MCP helper ─────────────────────────────────────
# This box has the RTX 5090 — embedding + interactive ask host for the fleet.
# Overrides the shared default of `client`. First provision pulls CUDA +
# the embedding container; confirm `nvidia-smi` works inside WSL first.
dex_role: server

# Upgraded from 14b: summaries are offloaded to mini_pc's 5080 (see below),
# freeing enough VRAM headroom to run 32b for interactive ask. Significant
# quality improvement for all agentic ask_codebase and generate_code calls.
dex_chat_model: "qwen2.5-coder:32b"

# qwen3-embedding:4b — code-specific 4B embedding model (~4 G). Replaced
# nomic-embed-text (generic, 0.3 G, poor code recall). Enabled by moving
# the Infinity rerank container to CPU (dex_rerank_gpu: ""), which freed
# the ~6 G it was consuming (1.1 G model + ~5 G Docker/PyTorch overhead).
dex_embed_model: "qwen3-embedding:4b"

# VRAM budget (keep_alive=-1, all pinned):
#   embed-4b   ~4.0 G  (qwen3-embedding:4b)
#   chat-32b   ~25 G   (Q4_K_M; 19 G weights + KV cache + CUDA workspace)
#   ───────────────────
#   total      ~29 G   (3 G headroom on 32 G card)
#
# Infinity rerank runs CPU-only (dex_rerank_gpu: "") — post-retrieval rerank
# on 10–50 candidates is fine at CPU latency; frees the ~6 G the container
# was burning on GPU. Summary tiers (3b/7b/14b) run on mini_pc via tunnel.
# compress/draft are dead code in dex — not wired into any call path.
dex_ollama_keep_alive: "-1"

# Run Infinity rerank container on CPU — freed 6 G of GPU VRAM for the 4b
# embed model. Rerank latency on 10–50 candidates is acceptable at CPU speed.
dex_rerank_gpu: ""

# Summary model names: dex requests these from DEX_SUMMARY_URL (mini_pc's
# ollama via the SSH tunnel below). mini_pc has all four pulled.
dex_chunk_summary_model: "qwen2.5-coder:3b"
dex_file_summary_model: "qwen2.5-coder:7b"
dex_package_summary_model: "qwen2.5-coder:14b"
dex_repo_summary_model: "qwen2.5-coder:14b"

# Concurrency for summary requests sent to mini_pc. mini_pc runs 8-parallel
# ollama; 4 concurrent HTTP calls from dex keeps the pipeline full without
# overwhelming the tunnel. Raise if monitoring shows mini_pc GPU idle.
dex_summary_concurrency: "4"

# Route DEX_SUMMARY_URL at the summary router (dotfiles #32), not directly at
# the tunnel. The router sits in front and fans summary chat calls across both
# GPUs: steady (default) → tunnel → mini_pc 5080 (identical to pointing here
# straight at 11435); burst → chunk tier to the local 5090, heavier tiers to
# 5080. So this must equal dex_summary_router_port (11436) — kept literal here
# rather than a nested {{ }} ref since mooncake resolves vars single-pass — and
# the router's REMOTE upstream is dex_summary_local_port (11435, the tunnel).
dex_summary_port: "11436"

# Enable the summary router on this box (it has both a local GPU and a remote
# summary worker, so it's the only host where fan-out makes sense).
# Flip burst/flood/steady with `dex-summary-mode`.
dex_summary_router: "1"

# Flood mode: evict the 32b ask model to free the 5090 so the router can
# round-robin all summary tiers onto it; on steady re-warm 32b and stop the
# summary-only tiers left resident (3b chunk, 14b package/repo).
dex_summary_router_flood_evict: "qwen2.5-coder:32b"
dex_summary_router_steady_stop: "qwen2.5-coder:3b qwen2.5-coder:14b"

# Summary worker: mini_pc's 5080 handles steady-state background summarization.
# dex-summary-tunnel.service (deployed by the dex component when this is
# non-empty) maintains:  127.0.0.1:11435 → mini_pc-wsl:127.0.0.1:11434  — which
# is the router's REMOTE upstream.
# Set dex_summary_host_ip to mini_pc's actual Windows host LAN IP.
dex_summary_host: "mini_pc-wsl"
dex_summary_host_ip: "192.168.50.2"

# No yield: summaries run on mini_pc, not on this GPU. The 5090 is never
# contended between foreground ask and background summarization.
dex_summarize_yield: ""

# Background draining ON. dex #17 drain lock still guards dex-serve's
# eager-watch. Yield is gone since nothing local competes for the GPU.
# Set to "1" to pause draining for debugging only.
dex_power_save: ""

# Long-lived project roots to keep auto-reindexed via dex-watch@.
# Adding a path here = enabled at next apply; removing it = disabled.
# Ad-hoc worktrees come and go through the zsh gwc/gwd helpers; only
# durable checkouts belong in this list.
# moongit is split into two dex roots: the Go module at repo root and the
# TS frontend at web/ (own .dex/config.toml, separate graph) — both watched
# + served (moongit #292 / dex #13).
dex_watch_paths: "/home/{{ username }}/dotfiles /home/{{ username }}/projects/mooncake /home/{{ username }}/projects/dex /home/{{ username }}/projects/moongit /home/{{ username }}/projects/moongit/web"

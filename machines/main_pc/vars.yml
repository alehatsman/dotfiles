---
# main_pc-specific variables (Windows + WSL Ubuntu).
is_wsl: true
computer_name: main_pc
wsl_distro: "Ubuntu-24.04"
wsl_ssh_port: "2222"
# Mooncake agentd TCP ports.
#   wsl_agentd_port (7878)    — Linux daemon inside the Ubuntu VM.
#                               Mirrored networking exposes it on the
#                               Windows host's LAN IP. Needs BOTH a
#                               Windows Firewall rule AND a Hyper-V
#                               Firewall rule (see bootstrap.yml).
#   windows_agentd_port (7879) — Windows daemon on the host itself.
#                                Only needs the regular WinFW rule.
# Both daemons appear as separate peers in peers.toml for fleet apply.
wsl_agentd_port: "7878"
windows_agentd_port: "7879"

# moongit server (components/moongit, MOONGIT_ADDR=:8080). moongitd binds
# *:8080, so mirrored networking puts it on the Windows host's LAN IP —
# but the Hyper-V VM defaults to DefaultInboundAction=Block, so reaching
# it from another box needs BOTH a Windows Firewall rule AND a Hyper-V
# Firewall rule (see bootstrap.yml), same as wsl_ssh_port/wsl_agentd_port.
# Direct LAN access avoids the SSE-coalescing an `ssh -L 8080` tunnel adds.
wsl_moongit_port: "8080"

# ─── claude — host-specific system prompt ─────────────────────────────────
# main_pc is the fleet's coordination + intel hub: it runs the moongit
# server (components/moongit) and the dex embedding server (dex_role:
# server). Agents here are beta testers of that stack, so they get a slim
# host-specific ~/.claude/CLAUDE.md that mandates mgit issue coordination
# and dex-first code intel instead of the shared trooper prompt. Path is
# resolved relative to components/claude/.
claude_system_prompt_src: "../../machines/main_pc/CLAUDE.md"

# ─── dex — semantic-search MCP helper ─────────────────────────────────────
# This box has the RTX 5090 — it's the embedding-service host for the fleet.
# Overrides the shared default of `client`. First provision pulls CUDA +
# the embedding container; confirm `nvidia-smi` works inside WSL first.
dex_role: server

# 32 GB VRAM lets chat (32B) + summary (7B) + embed (4B) all stay
# resident, so the index-time summary fan-out doesn't fight chat for
# VRAM. Push concurrency until the 7B saturates rather than worrying
# about swaps. The shared default is 4 (safe for any GPU host).
dex_summary_concurrency: "16"

# Per-tier summary model ladder — quality scales inversely with call
# volume. Hundreds of chunk summaries on 3B (throughput wins), tens of
# file summaries on 7B (balanced), ~dozens of package summaries on 14B
# (quality compounds into LLM_GUIDE.md), one repo summary on 32B (the
# top-level overview is read most often and deserves the strongest
# model we can fit). All four models stay pulled in ollama on this
# box; cold-start hits amortize over the indexing run.
dex_chunk_summary_model: "qwen2.5-coder:3b"
dex_file_summary_model: "qwen2.5-coder:7b"
dex_package_summary_model: "qwen2.5-coder:14b"
dex_repo_summary_model: "qwen2.5-coder:32b"

# Long-lived project roots to keep auto-reindexed via dex-watch@.
# Adding a path here = enabled at next apply; removing it = disabled.
# Ad-hoc worktrees come and go through the zsh gwc/gwd helpers; only
# durable checkouts belong in this list.
dex_watch_paths: "/home/{{ username }}/dotfiles /home/{{ username }}/projects/mooncake /home/{{ username }}/projects/dex /home/{{ username }}/projects/moongit"

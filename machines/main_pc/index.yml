---
# main_pc — Windows 11 desktop, provisioned via WSL2 Ubuntu.
#
# Two-step provisioning:
#   1. Windows host (from an Administrator PowerShell):
#        mooncake.exe apply -c platforms/windows/bootstrap.yml \
#                           -v shared/variables.yml -v machines/main_pc/vars.yml
#   2. Inside WSL Ubuntu, either:
#        mooncake apply -c machines/main_pc/index.yml \
#                       -v shared/variables.yml -v machines/main_pc/vars.yml -K
#      or via the daemon:
#        curl --unix-socket /run/user/$UID/mooncake/agentd.sock \
#             -d '{"plan_path":"<abs>/machines/main_pc/index.yml",
#                  "base_dir":"<abs>"}' http://localhost/v1/runs
#
# The vars: step below pins machine-identity values so the agentd path
# (which doesn't accept -v files yet) works without an external vars
# file. CLI invocations get the same values via machines/main_pc/vars.yml.

- vars:
    is_wsl: true
    wsl_distro: "Ubuntu-24.04"
    wsl_ssh_port: "2222"

- import: ../../shared/bootstrap.yml

- import: ../../platforms/windows/index.yml
  tags: [wsl, windows]

# Cross-platform components
- import: ../../components/claude/index.yml
  tags: [core, claude]

- import: ../../components/git/index.yml
  tags: [core, git]

- import: ../../components/languages/index.yml
  tags: [dev, languages]

- import: ../../components/clojure/index.yml
  tags: [dev, clojure, config]

- import: ../../components/zsh/index.yml
  tags: [core, shell]

- import: ../../components/tmux/index.yml
  tags: [tools, tmux]

- import: ../../components/nvim/index.yml
  tags: [editor, nvim]

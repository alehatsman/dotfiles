---
# x1 thermal + power tuning. Targets ThinkPad X1 Carbon Gen 13 (Ultra 7
# 255U, Arrow Lake-U, Xe-LPG iGPU). The 255U's iGPU binds to i915 by
# default on mainline Linux — xe is default only from Lunar Lake/
# Battlemage onward — so the i915.* params and i915 sysfs freq paths
# below are correct for this chip. Values come from vars.yml.
#
# Re-apply just this slice with:
#   mooncake apply -c ./x1.yml -K -t thermal

- name: Set TLP platform_profile from vars
  file.write:
    path: /etc/tlp.d/01-platform-profile.conf
    state: file
    content: |
      # Hold the firmware ACPI profile across boots and TLP restarts.
      # Value sourced from machines/x1/vars.yml → thermal_platform_profile.
      PLATFORM_PROFILE_ON_AC={{ thermal_platform_profile }}
      PLATFORM_PROFILE_ON_BAT={{ thermal_platform_profile }}
    mode: '0644'
  as_user: root
  tags: [thermal]

- name: Drop TLP cooling tweaks (capped turbo, deeper EPP, ASPM, runtime PM)
  file.write:
    path: /etc/tlp.d/02-cool.conf
    state: file
    content: |
      # Cooling tweaks for X1 Carbon Gen 13 / Ultra 7 255U.
      # Goal: cold + quiet, perf not a priority. Combine with the
      # RAPL PL1/PL2 caps from the intel-rapl-cap.service unit.

      # Cap clock ceiling — turbo still works but bounded.
      CPU_MIN_PERF_ON_AC=0
      CPU_MAX_PERF_ON_AC={{ thermal_cpu_max_perf_ac }}
      CPU_MIN_PERF_ON_BAT=0
      CPU_MAX_PERF_ON_BAT={{ thermal_cpu_max_perf_bat }}

      # Tell HWP to prefer power over performance at every decision.
      CPU_ENERGY_PERF_POLICY_ON_AC=power
      CPU_ENERGY_PERF_POLICY_ON_BAT=power

      # Disable HWP's autonomous opportunistic boost.
      CPU_HWP_DYN_BOOST_ON_AC=0
      CPU_HWP_DYN_BOOST_ON_BAT=0

      # Kill turbo entirely on battery — keep it on AC for bursty work.
      CPU_BOOST_ON_AC=1
      CPU_BOOST_ON_BAT=0

      # Aggressive PCIe ASPM — biggest idle-watt reduction.
      PCIE_ASPM_ON_AC=powersupersave
      PCIE_ASPM_ON_BAT=powersupersave

      # Runtime PM + USB autosuspend on everywhere.
      RUNTIME_PM_ON_AC=auto
      RUNTIME_PM_ON_BAT=auto
      USB_AUTOSUSPEND=1

      # WiFi power-save always on (free idle wattage).
      WIFI_PWR_ON_AC=on
      WIFI_PWR_ON_BAT=on

      # Let the scheduler park work on LP-E cores.
      SCHED_POWERSAVE_ON_AC=1
      SCHED_POWERSAVE_ON_BAT=1

      # Stop NMI watchdog from waking every CPU constantly.
      NMI_WATCHDOG=0
    mode: '0644'
  as_user: root
  tags: [thermal]

- name: Apply TLP config
  os.service:
    name: tlp
    state: restarted
    enabled: true
  as_user: root
  tags: [thermal]

- name: Enable Intel HDA audio runtime power-save
  file.write:
    path: /etc/modprobe.d/snd_hda_intel-powersave.conf
    state: file
    content: |
      # Let the HDA audio chip enter D3 when idle (~0.5 W).
      options snd_hda_intel power_save=1 power_save_controller=Y
    mode: '0644'
  as_user: root
  tags: [thermal]

- name: Apply HDA powersave now (no reboot needed)
  shell: |
    set -euo pipefail
    echo 1 > /sys/module/snd_hda_intel/parameters/power_save 2>/dev/null || true
    echo Y > /sys/module/snd_hda_intel/parameters/power_save_controller 2>/dev/null || true
  as_user: root
  tags: [thermal]

# systemd-boot cmdline tweaks. Two independent edits to
# /boot/loader/entries/arch.conf, each idempotent and gated by
# unless_command so neither fires when the file is missing (live
# from a different bootloader) or already at desired state.
- name: Upgrade i915.enable_psr=1 to =2 in boot cmdline
  text.replace:
    path: /boot/loader/entries/arch.conf
    pattern: 'i915.enable_psr=1'
    replace: 'i915.enable_psr=2'
    allow_no_match: true
    flags:
      regex: false
  as_user: root
  unless_command: test ! -f /boot/loader/entries/arch.conf
  tags: [thermal, bootloader]

- name: Prepend i915 power-save params to boot cmdline (if not already)
  # `unless_command` skips when arch.conf doesn't exist OR already
  # contains the marker param. Matches the elif branch in the old
  # shell — once fbc is set, the prepend stops firing.
  text.replace:
    path: /boot/loader/entries/arch.conf
    pattern: '^options '
    replace: 'options i915.enable_fbc=1 i915.enable_psr=2 i915.enable_dc=4 nmi_watchdog=0 '
    allow_no_match: true
    flags:
      regex: true
      multiline: true
  as_user: root
  unless_command: |
    test ! -f /boot/loader/entries/arch.conf || \
      grep -q 'i915.enable_fbc' /boot/loader/entries/arch.conf
  tags: [thermal, bootloader]

- name: Deploy intel-rapl-cap script
  file.write:
    path: /usr/local/bin/intel-rapl-cap
    state: file
    content: |
      #!/bin/sh
      # Cap Intel RAPL power limits — PL1 sustained, PL2 brief burst.
      # Values come from machines/x1/vars.yml at deploy time; firmware
      # default ceiling on Ultra 7 255U is ~57W.
      PL1_UW=$(({{ thermal_rapl_pl1_w }} * 1000000))
      PL2_UW=$(({{ thermal_rapl_pl2_w }} * 1000000))
      RAPL=/sys/class/powercap/intel-rapl/intel-rapl:0
      [ -d "$RAPL" ] || exit 0
      echo "$PL1_UW" > "$RAPL/constraint_0_power_limit_uw" 2>/dev/null || true
      echo "$PL2_UW" > "$RAPL/constraint_1_power_limit_uw" 2>/dev/null || true
    mode: '0755'
  as_user: root
  tags: [thermal, rapl]

- name: Deploy intel-rapl-cap.service (apply at boot)
  os.systemd:
    name: intel-rapl-cap.service
    unit:
      Description: "Cap Intel RAPL power limits (PL1/PL2) for thermals"
      After: multi-user.target
    service:
      Type: oneshot
      ExecStart: /usr/local/bin/intel-rapl-cap
    install:
      WantedBy: multi-user.target
    enabled: true
    started: true
  as_user: root
  tags: [thermal, rapl]

- name: Deploy intel-rapl-cap-resume.service (re-apply after suspend)
  # Enabled but not started — fires on the WantedBy hooks (suspend /
  # hibernate / hybrid-sleep / suspend-then-hibernate target start)
  # not at deploy time.
  os.systemd:
    name: intel-rapl-cap-resume.service
    unit:
      Description: "Re-apply Intel RAPL caps after resume"
      After: "suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target"
    service:
      Type: oneshot
      ExecStart: /usr/local/bin/intel-rapl-cap
    install:
      WantedBy: "suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target"
    enabled: true
  as_user: root
  tags: [thermal, rapl]

- name: Deploy intel-gt-freq-cap script
  file.write:
    path: /usr/local/bin/intel-gt-freq-cap
    state: file
    content: |
      #!/bin/sh
      # Cap Intel iGPU max frequency for thermals. Value is templated from
      # machines/x1/vars.yml; on Arrow Lake-U Xe-LPG (255U) the hardware
      # range tops at RP0=2100 MHz. These are the i915 sysfs paths, which
      # is the driver this chip uses by default. Cap boost too — left
      # uncapped, boost paths still spike to RP0.
      CAP_MHZ={{ thermal_igpu_max_mhz }}
      for card in /sys/class/drm/card*; do
          [ -f "$card/gt_max_freq_mhz" ] || continue
          echo "$CAP_MHZ" > "$card/gt_max_freq_mhz" 2>/dev/null || true
          [ -f "$card/gt_boost_freq_mhz" ] && \
              echo "$CAP_MHZ" > "$card/gt_boost_freq_mhz" 2>/dev/null || true
          for gt in "$card"/gt/gt*; do
              [ -f "$gt/rps_max_freq_mhz" ] || continue
              echo "$CAP_MHZ" > "$gt/rps_max_freq_mhz" 2>/dev/null || true
          done
      done
    mode: '0755'
  as_user: root
  tags: [thermal, igpu]

- name: Deploy intel-gt-freq-cap.service (apply at boot)
  os.systemd:
    name: intel-gt-freq-cap.service
    unit:
      Description: "Cap Intel iGPU max frequency for thermals"
      After: multi-user.target
    service:
      Type: oneshot
      ExecStart: /usr/local/bin/intel-gt-freq-cap
    install:
      WantedBy: multi-user.target
    enabled: true
    started: true
  as_user: root
  tags: [thermal, igpu]

- name: Deploy intel-gt-freq-cap-resume.service (re-apply after suspend)
  os.systemd:
    name: intel-gt-freq-cap-resume.service
    unit:
      Description: "Re-apply Intel iGPU freq cap after resume"
      After: "suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target"
    service:
      Type: oneshot
      ExecStart: /usr/local/bin/intel-gt-freq-cap
    install:
      WantedBy: "suspend.target hibernate.target hybrid-sleep.target suspend-then-hibernate.target"
    enabled: true
  as_user: root
  tags: [thermal, igpu]

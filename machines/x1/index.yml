---
# x1 — ThinkPad X1 Carbon Gen 13, Arch Linux, Hyprland Wayland.

- vars:
    is_wsl: false

- import: ../../shared/bootstrap.yml

- import: ../../platforms/arch/index.yml
  tags: [arch, system, packages]

# x1-specific tuning (TLP, RAPL, iGPU freq cap, HDA, i915 cmdline)
- import: ./thermal.yml
  tags: [thermal]

# Cross-platform components
- import: ../../components/claude/index.yml
  tags: [core, claude]

- import: ../../components/git/index.yml
  tags: [core, git]

- import: ../../components/languages/index.yml
  tags: [dev, languages]

- import: ../../components/clojure/index.yml
  tags: [dev, clojure, config]

- import: ../../components/zsh/index.yml
  tags: [core, shell]

- import: ../../components/tmux/index.yml
  tags: [tools, tmux]

- import: ../../components/nvim/index.yml
  tags: [editor, nvim]

# Semantic-search MCP helper. No-op until mcsearch_role is flipped from
# `skip` (the shared default) to `client` in vars.yml.
- import: ../../components/mcsearch/index.yml
  tags: [tools, mcsearch]

# Desktop
- name: Install Hyprland desktop
  use:
    name: hyprland
  tags: [gui, hyprland]

- import: ../../components/hyprland/index.yml
  tags: [gui, hyprland, config]

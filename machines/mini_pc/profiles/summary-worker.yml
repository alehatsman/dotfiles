---
# mini_pc summary-worker profile — RTX 5080 as the fleet summary endpoint.
#
# mini_pc runs ollama at maximum throughput for background summary generation;
# main_pc's 5090 is freed entirely for the latency-sensitive foreground path
# (embed, ask, compress, rerank). main_pc tunnels DEX_SUMMARY_URL here via
# dex-summary-tunnel.service (127.0.0.1:11435 → this box's ollama:11434).
#
# VRAM budget (5m keep_alive):
#   all tiers: qwen3:14b  ~8.7 GB Q4_K_M (Ollama default)
#                         ~12.9 GB Q5_K_M (pull explicitly for better quality)
#   ─────────────────────────────────────────────────────
#   peak:      ~8.7–12.9 GB of 16 GB (3–7 GB headroom)
#
# Single model for all tiers — no cycling needed. Model stays loaded across
# the whole drain since all tiers use the same name. Qwen3-14B matches
# Qwen2.5-32B quality on coding benchmarks (~59 t/s on RTX 5080).
# Non-thinking mode mandatory for 1–4 sentence summaries.

# Summary tier models pulled and served on this box.
dex_chunk_summary_model: "qwen3:14b"
dex_file_summary_model: "qwen3:14b"
dex_package_summary_model: "qwen3:14b"
dex_repo_summary_model: "qwen3:14b"

# 4 concurrent requests — single model stays resident so no cold-load
# overhead; 4 workers keeps the 5080 saturated at ~59 t/s.
dex_ollama_num_parallel: "4"

# Single model stays warm — 5m TTL is effectively a no-op since all tiers
# hit the same qwen3:14b. Set -1 to pin permanently if memory allows.
dex_ollama_keep_alive: "5m"

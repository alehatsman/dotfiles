---
# mini_pc-specific variables (Windows + WSL Ubuntu).
is_wsl: true
computer_name: mini_pc
wsl_distro: "Ubuntu-24.04"
wsl_ssh_port: "2222"
# mirrored networking flaps the WSL guest's LAN exposure on this box; use NAT
# + netsh portproxy + a persistent-session keepalive instead (dotfiles #16).
# Enables the portproxy/keepalive steps in platforms/windows/bootstrap.yml.
wsl_networking_mode: "mirrored"
# moongit server port. mini_pc isn't the moongit host (main_pc is), but
# the shared platforms/windows/bootstrap.yml opens this port uniformly on
# every Windows box, so the var must be defined or the firewall step fails
# rendering "{{ wsl_moongit_port }}". moongitd binds *:8080 inside WSL.
wsl_moongit_port: "8080"
# Mooncake agentd TCP ports.
#   wsl_agentd_port (7878)     — Linux daemon inside the Ubuntu VM.
#                                Mirrored networking exposes it on the
#                                Windows host's LAN IP. Needs BOTH a
#                                Windows Firewall rule AND a Hyper-V
#                                Firewall rule (see bootstrap.yml).
#   windows_agentd_port (7879) — Windows-host daemon. Bootstrapped from
#                                the controller via `mooncake fleet
#                                bootstrap`; the port number lives here
#                                because the diagnostic / fleet-pair
#                                hint in `Print next steps` references it.
# Both daemons appear as separate peers in peers.toml for fleet apply.
wsl_agentd_port: "7878"
windows_agentd_port: "7879"

# ─── dex — semantic-search MCP helper ─────────────────────────────────────
# Two provisioning profiles — pick the manifest that matches the desired role:
#   mini_pc.yml        (this file only) — dex_role=client, inherits from
#                      shared; tunnels to main_pc's 5090 via main_pc-wsl.
#   mini_pc_server.yml (+ gpu-server profile) — dex_role=server; runs
#                      ollama + rerank on the local RTX 5080 (16 GB VRAM).
# See machines/mini_pc/profiles/gpu-server.yml for the 5080 VRAM budget.
# moongit lives on main_pc (192.168.50.1); override the default localhost URL.
dex_src_url: "http://192.168.50.1:8080/alehatsman/dex.git"
# Client tunnels to main_pc's 5090 — model names must match what's loaded there.
dex_embed_model: "qwen3-embedding:4b"
dex_chat_model: "qwen3-coder:30b-a3b-q4_K_M"
# No local reranker. Clear the port so DEX_RERANK_URL is empty and dex
# doctor doesn't warn about a missing :8082.
dex_rerank_local_port: ""

# Server box — never sleep on AC. Disables standby + hibernate so WSL and
# its daemons (ssh, dex-serve, ollama) stay reachable 24/7.
windows_prevent_sleep: true

---
# mac-specific variables.
is_wsl: false
computer_name: mac

# ─── dex — semantic-search MCP helper ─────────────────────────────────
# Inherits dex_role=client from shared/variables.yml. The dex
# component automatically writes the Host main_pc-wsl alias into
# ~/.ssh/config (using dex_remote_ip/port/user from shared/variables.yml)
# so the tunnel resolves without any manual prerequisite.

dex_embed_model: "nomic-embed-text:latest"
dex_chat_model: "qwen2.5-coder:32b"

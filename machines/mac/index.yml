---
# mac — macOS workstation. Homebrew + macOS defaults + dotfiles.

- vars:
    is_wsl: false

- import: ../../shared/bootstrap.yml

- import: ../../platforms/macos/index.yml
  tags: [macos]

# Cross-platform components
# Palette must come first — every later component's templates read
# palette.* / editor.* from the variant selected by `palette_variant`.
- import: ../../components/palette/index.yml
  tags: [core, palette]

- import: ../../components/claude/index.yml
  tags: [core, claude]

- import: ../../components/git/index.yml
  tags: [core, git]

- import: ../../components/languages/index.yml
  tags: [dev, languages]

- import: ../../components/clojure/index.yml
  tags: [dev, clojure, config]

- import: ../../components/zsh/index.yml
  tags: [core, shell]

- import: ../../components/atuin/index.yml
  tags: [core, shell, atuin]

- import: ../../components/tmux/index.yml
  tags: [tools, tmux]

- import: ../../components/nvim/index.yml
  tags: [editor, nvim]

# Semantic-search MCP helper. Disabled — uncomment to re-enable.
# - import: ../../components/mcsearch/index.yml
#   tags: [tools, mcsearch]

# Terminal
- import: ../../components/alacritty/index.yml
  tags: [macos, terminal, config]

---
- name: "Install claude if not present"
  shell: |
    if ! which claude >/dev/null 2>&1; then
      curl -sSL https://claude.ai/install.sh | sh
    fi
  ignore_errors: true
  tags: [claude]

- name: "Make sure claude config directory exists"
  file:
    path: "~/.claude"
    state: directory
  tags: [claude]

- name: "Deploy claude config"
  template:
    src: "./config.yml"
    dest: "~/.claude/config.yml"
  tags: [claude]

- name: "Deploy claude settings"
  copy:
    src: "./settings.json"
    dest: "~/.claude/settings.json"
  tags: [claude]

- name: "Install claude-autoapprove"
  shell: |
    tmpdir=$(mktemp -d)
    git clone https://github.com/alehatsman/claude-autoapprove "$tmpdir/claude-autoapprove"
    cd "$tmpdir/claude-autoapprove"
    go build -o claude-autoapprove ./cmd/claude-autoapprove
    sudo mv claude-autoapprove /usr/local/bin/claude-autoapprove
    rm -rf "$tmpdir"
  creates: /usr/local/bin/claude-autoapprove
  tags: [claude]

- name: "Install gopls LSP plugin"
  shell: "claude plugins install gopls-lsp@claude-plugins-official --scope user"
  ignore_errors: true
  tags: [claude]

- name: "Install lua LSP plugin"
  shell: "claude plugins install lua-lsp@claude-plugins-official --scope user"
  ignore_errors: true
  tags: [claude]

- name: "Install typescript LSP plugin"
  shell: "claude plugins install typescript-lsp@claude-plugins-official --scope user"
  ignore_errors: true
  tags: [claude]

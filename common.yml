---
# Shared provisioning across every machine. Each entry under entries/
# imports this on top of its OS/host-specific bits.
#
# Anything OS-conditional (apt vs brew vs pacman, macOS defaults, hyprland,
# wsl) lives outside this file — entries own that.

# Make sure mooncake's preset library is available locally. Subsequent
# `use:` steps need ~/.mooncake/presets populated; mooncake's binary
# doesn't bundle them today. Clone-or-pull the mooncake source and
# symlink its presets/ dir into the per-user search path. Idempotent.
- name: Ensure mooncake preset library is installed
  shell: |
    set -e
    SRC=$HOME/.mooncake-src
    LINK=$HOME/.mooncake/presets
    # Fail fast instead of hanging on a credential prompt when run from a
    # non-interactive context (mooncake's shell action has no TTY).
    export GIT_TERMINAL_PROMPT=0
    # Use `mise/preset.yml` as the marker — the current mooncake presets/
    # dir only ships a small library (mise, docker, fzf, jq, k8s-tools…).
    # Older presets (python, rust, go, java) moved to presets-archive
    # upstream; this dotfile installs language toolchains directly via
    # the package manager / mise instead of via `use:` on those.
    if [ ! -e "$SRC/presets/mise/preset.yml" ]; then
      rm -rf "$SRC"
      mkdir -p "$(dirname "$SRC")"
      # SSH URL — the mooncake repo may be private; HTTPS would require
      # a token. Each machine is expected to have an SSH key registered
      # on GitHub (the same one used to push from this dotfiles repo).
      git clone --depth=1 git@github.com:alehatsman/mooncake.git "$SRC"
    else
      git -C "$SRC" pull --ff-only --quiet || true
    fi
    mkdir -p "$(dirname "$LINK")"
    # ln -sfn replaces dangling/old symlinks atomically.
    ln -sfn "$SRC/presets" "$LINK"
    test -e "$LINK/mise/preset.yml" || { echo "preset library missing mise/"; exit 1; }
  tags: [core, presets]

- name: Rename ~/Projects to ~/projects (lowercase convention)
  shell: |
    if [ -d "$HOME/Projects" ] && [ ! -e "$HOME/projects" ]; then
      mv "$HOME/Projects" "$HOME/projects"
    fi
  when: os == "linux"
  tags: [core, home]

- import: ./claude/main.yml
  tags: [core, claude]

# Cross-environment package install (apt on Ubuntu/Debian, brew on macOS,
# pacman on Arch). packages/main.yml routes by os + distribution; the
# arch branch is currently empty because Arch's pacman install lives in
# platforms/arch/packages.yml — invoked from entries/x1.yml directly.
- import: ./packages/main.yml
  tags: [core, packages]

- import: ./git/main.yml
  tags: [core, git]

# Python 3 install via the system package manager. Was previously the
# `python` preset (pyenv-based version pinning), now archived upstream.
# For pinned-version workflows on top of this, use mise (Install mise
# elsewhere in this stack) and `mise install python@<version>`.
- name: Install Python 3
  shell: |
    set -e
    # Already provisioned?
    if command -v python3 >/dev/null 2>&1 \
       && command -v pip3 >/dev/null 2>&1 \
       && python3 -c "import venv" >/dev/null 2>&1; then
      exit 0
    fi
    if command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update -qq
      sudo apt-get install -y python3 python3-pip python3-venv
    elif command -v brew >/dev/null 2>&1; then
      brew install python
    elif command -v pacman >/dev/null 2>&1; then
      sudo pacman -S --noconfirm --needed python python-pip
    else
      echo "no supported package manager (apt/brew/pacman)" >&2
      exit 1
    fi
  tags: [dev, python]

# Rust via rustup (the canonical installer). The `--no-modify-path` keeps
# our shell init untouched — the cargo bin dir is added by zsh config.
- name: Install Rust toolchain
  shell: |
    set -e
    if command -v rustup >/dev/null 2>&1; then
      rustup show >/dev/null && exit 0
    fi
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
      sh -s -- -y --default-toolchain stable --profile default --no-modify-path
  tags: [dev, rust]

- name: Install Go toolchain
  shell: |
    set -e
    if command -v go >/dev/null 2>&1; then exit 0; fi
    if command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update -qq
      sudo apt-get install -y golang-go
    elif command -v brew >/dev/null 2>&1; then
      brew install go
    elif command -v pacman >/dev/null 2>&1; then
      sudo pacman -S --noconfirm --needed go
    else
      echo "no supported package manager" >&2; exit 1
    fi
  tags: [dev, golang]

- name: Install Java JDK
  shell: |
    set -e
    if command -v javac >/dev/null 2>&1; then exit 0; fi
    if command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update -qq
      sudo apt-get install -y openjdk-21-jdk
    elif command -v brew >/dev/null 2>&1; then
      brew install openjdk@21
    elif command -v pacman >/dev/null 2>&1; then
      sudo pacman -S --noconfirm --needed jdk21-openjdk
    else
      echo "no supported package manager" >&2; exit 1
    fi
  tags: [dev, java]

# Clojure and fzf are listed in packages/ubuntu_packages.yml / darwin_packages.yml
# and get installed by the import: ./packages/main.yml step above. No
# separate `use:` blocks needed — those moved to presets-archive.
- name: Deploy Clojure configs
  import: ./clojure/config.yml
  tags: [dev, clojure, config]

- import: ./zsh/main.yml
  tags: [core, shell]

- import: ./tmux/install.yml
  tags: [tools, tmux]

- name: Deploy tmux config
  import: ./tmux/config.yml
  tags: [tools, tmux, config]

- import: ./nvim/main.yml
  tags: [editor, nvim]

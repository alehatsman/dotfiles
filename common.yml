---
# Shared provisioning across every machine. Each entry under entries/
# imports this on top of its OS/host-specific bits.
#
# Anything OS-conditional (apt vs brew vs pacman, macOS defaults, hyprland,
# wsl) lives outside this file — entries own that.

# Make sure mooncake's preset library is available locally. Subsequent
# `use:` steps need ~/.mooncake/presets populated; mooncake's binary
# doesn't bundle them today. Clone-or-update the mooncake source and
# symlink its presets/ dir into the per-user search path. Idempotent.
#
# SSH URL — the mooncake repo may be private; HTTPS would require a
# token. Each machine is expected to have an SSH key registered on
# GitHub (the same one used to push from this dotfiles repo).
- name: Clone or update mooncake source for preset library
  git.clone:
    repo: git@github.com:alehatsman/mooncake.git
    dest: ~/.mooncake-src
    depth: 1
    update: true
  tags: [core, presets]

- name: Ensure ~/.mooncake exists
  file.write:
    path: ~/.mooncake
    state: directory
  tags: [core, presets]

- name: Link mooncake presets into per-user search path
  file.write:
    path: ~/.mooncake/presets
    src: ~/.mooncake-src/presets
    state: link
    force: true
  tags: [core, presets]

# Use `mise/preset.yml` as the marker — the current mooncake presets/
# dir only ships a small library (mise, docker, fzf, jq, k8s-tools…).
# Older presets (python, rust, go, java) moved to presets-archive
# upstream; this dotfile installs language toolchains directly via
# the package manager / mise instead of via `use:` on those.
- name: Verify preset library is populated
  assert:
    file:
      path: ~/.mooncake/presets/mise/preset.yml
      exists: true
  tags: [core, presets]

- name: Rename ~/Projects to ~/projects (lowercase convention)
  shell: mv "$HOME/Projects" "$HOME/projects"
  when: os == "linux"
  unless_command: test -e "$HOME/projects" || ! test -d "$HOME/Projects"
  tags: [core, home]

- import: ./claude/main.yml
  tags: [core, claude]

# Cross-environment package install (apt on Ubuntu/Debian, brew on macOS,
# pacman on Arch). packages/main.yml routes by os + distribution; the
# arch branch is currently empty because Arch's pacman install lives in
# platforms/arch/packages.yml — invoked from entries/x1.yml directly.
- import: ./packages/main.yml
  tags: [core, packages]

- import: ./git/main.yml
  tags: [core, git]

# Python 3 install via the system package manager. Was previously the
# `python` preset (pyenv-based version pinning), now archived upstream.
# For pinned-version workflows on top of this, use mise (Install mise
# elsewhere in this stack) and `mise install python@<version>`.
- name: Install Python 3 (apt)
  pkg:
    names: [python3, python3-pip, python3-venv]
  as_user: root
  when: apt_available
  tags: [dev, python]

- name: Install Python 3 (brew)
  pkg:
    name: python
  when: brew_available
  tags: [dev, python]

- name: Install Python 3 (pacman)
  pkg:
    names: [python, python-pip]
  as_user: root
  when: pacman_available
  tags: [dev, python]

# Rust via rustup (the canonical installer). The `--no-modify-path` keeps
# our shell init untouched — the cargo bin dir is added by zsh config.
- name: Install Rust toolchain via rustup
  shell: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
      sh -s -- -y --default-toolchain stable --profile default --no-modify-path
  unless_command: command -v rustup >/dev/null 2>&1 && rustup show >/dev/null 2>&1
  tags: [dev, rust]

- name: Install Go toolchain (apt)
  pkg:
    name: golang-go
  as_user: root
  when: apt_available
  tags: [dev, golang]

- name: Install Go toolchain (brew)
  pkg:
    name: go
  when: brew_available
  tags: [dev, golang]

- name: Install Go toolchain (pacman)
  pkg:
    name: go
  as_user: root
  when: pacman_available
  tags: [dev, golang]

- name: Install Java JDK (apt)
  pkg:
    name: openjdk-21-jdk
  as_user: root
  when: apt_available
  tags: [dev, java]

- name: Install Java JDK (brew)
  pkg:
    name: openjdk@21
  when: brew_available
  tags: [dev, java]

- name: Install Java JDK (pacman)
  pkg:
    name: jdk21-openjdk
  as_user: root
  when: pacman_available
  tags: [dev, java]

# Clojure and fzf are listed in packages/ubuntu_packages.yml / darwin_packages.yml
# and get installed by the import: ./packages/main.yml step above. No
# separate `use:` blocks needed — those moved to presets-archive.
- name: Deploy Clojure configs
  import: ./clojure/config.yml
  tags: [dev, clojure, config]

- import: ./zsh/main.yml
  tags: [core, shell]

- import: ./tmux/install.yml
  tags: [tools, tmux]

- name: Deploy tmux config
  import: ./tmux/config.yml
  tags: [tools, tmux, config]

- import: ./nvim/main.yml
  tags: [editor, nvim]

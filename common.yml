---
# Shared provisioning across every machine. Each entry under entries/
# imports this on top of its OS/host-specific bits.
#
# Anything OS-conditional (apt vs brew vs pacman, macOS defaults, hyprland,
# wsl) lives outside this file — entries own that.

# Make sure mooncake's preset library is available locally. The first
# `use:` step in this file (Install Python via pyenv) needs ~/.mooncake/presets
# populated; mooncake's binary doesn't bundle them today. Clone-or-pull
# the mooncake source and symlink its presets/ dir into the per-user
# search path. Idempotent.
- name: Ensure mooncake preset library is installed
  shell: |
    set -e
    SRC=$HOME/.mooncake-src
    LINK=$HOME/.mooncake/presets
    if [ ! -d "$SRC/.git" ]; then
      mkdir -p "$(dirname "$SRC")"
      git clone --depth=1 https://github.com/alehatsman/mooncake.git "$SRC"
    else
      git -C "$SRC" pull --ff-only --quiet || true
    fi
    mkdir -p "$(dirname "$LINK")"
    # ln -sfn replaces dangling/old symlinks atomically.
    ln -sfn "$SRC/presets" "$LINK"
    test -e "$LINK/python/preset.yml" || { echo "preset library missing python/"; exit 1; }
  tags: [core, presets]

- import: ./claude/main.yml
  tags: [core, claude]

# Cross-environment package install (apt on Ubuntu/Debian, brew on macOS,
# pacman on Arch). packages/main.yml routes by os + distribution; the
# arch branch is currently empty because Arch's pacman install lives in
# platforms/arch/packages.yml — invoked from entries/x1.yml directly.
- import: ./packages/main.yml
  tags: [core, packages]

- import: ./git/main.yml
  tags: [core, git]

- name: Install Python via pyenv
  use:
    name: python
    with:
      version: "3.12.12"
      install_virtualenv: true
  tags: [dev, python]

- name: Install Rust toolchain
  use:
    name: rust
    with:
      toolchain: stable
      profile: default
  tags: [dev, rust]

- name: Install Go toolchain
  use:
    name: go
    with:
      version: "latest"
  tags: [dev, golang]

- name: Install Java JDK
  use:
    name: java
    with:
      version: "21"
      set_java_home: true
  tags: [dev, java]

- name: Install Clojure
  use:
    name: clojure
  tags: [dev, clojure]

- name: Deploy Clojure configs
  import: ./clojure/config.yml
  tags: [dev, clojure, config]

- name: Install fzf fuzzy finder
  use:
    name: fzf
    with:
      install_shell_extensions: true
      install_vim_plugin: false
  tags: [tools, fzf]

- import: ./zsh/main.yml
  tags: [core, shell]

- import: ./tmux/install.yml
  tags: [tools, tmux]

- name: Deploy tmux config
  import: ./tmux/config.yml
  tags: [tools, tmux, config]

- import: ./nvim/main.yml
  tags: [editor, nvim]

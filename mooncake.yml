---
# Root dispatcher — run `mooncake apply` from the repo root without -c.
# Routes to the correct machine manifest based on the hostname fact.
#
# WSL strips underscores from hostnames (RFC 952), so main_pc → mainpc,
# mini_pc → minipc. Mac and x1 have no underscores and match directly.
#
# Alternate profiles (mini_pc_server.yml, mini_pc_summary.yml) are
# intentionally excluded — invoke those explicitly with -c.

- import: ./main_pc.yml
  when: hostname == 'mainpc'

- import: ./mini_pc.yml
  when: hostname == 'minipc'

- import: ./mac.yml
  when: hostname == 'mac'

- import: ./x1.yml
  when: hostname == 'x1'

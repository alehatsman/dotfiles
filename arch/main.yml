---
- name: Update pacman mirrors and system
  shell: |
    pacman -Syu --noconfirm
  become: true
  timeout: 15m
  retries: 3
  retry_delay: 10s

- name: Install base-devel and git
  shell: |
    pacman -S --noconfirm --needed base-devel git
  become: true
  timeout: 5m

- name: Install yay AUR helper
  shell: |
    if ! command -v yay > /dev/null; then
      tmpdir=$(mktemp -d)
      git clone https://aur.archlinux.org/yay.git "$tmpdir/yay"
      cd "$tmpdir/yay" && makepkg -si --noconfirm
      rm -rf "$tmpdir"
    else
      echo "yay is already installed. Skipping..."
    fi
  register: yay_result
  changed_when: "'already installed' not in yay_result.stdout"
  timeout: 10m

- include_vars: ./packages.yml

- name: Install pacman packages
  shell: |
    pacman -S --noconfirm --needed {{ pacman_packages | join: " " }}
  become: true
  timeout: 20m
  retries: 3
  retry_delay: 10s

- name: Install AUR packages
  shell: |
    yay -S --noconfirm --needed {{ aur_packages | join: " " }}
  timeout: 15m
  retries: 2
  retry_delay: 10s

- name: Enable NetworkManager
  shell: systemctl enable --now NetworkManager
  become: true

- name: Enable thermald
  shell: systemctl enable --now thermald
  become: true

- name: Enable TLP for battery management
  shell: systemctl enable --now tlp
  become: true

- name: Enable bluetooth
  shell: systemctl enable --now bluetooth
  become: true

- name: Enable SSH daemon
  shell: systemctl enable --now sshd
  become: true

- name: Enable firmware update timer
  shell: systemctl enable --now fwupd-refresh.timer
  become: true

- name: Set default shell to zsh
  shell: chsh -s $(which zsh) {{ OS_USERNAME }}
  become: true

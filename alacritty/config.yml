---
# Alacritty configuration deployment (installation handled by preset)

- name: Create alacritty config directory
  file.write:
    path: ~/.config/alacritty
    state: directory
  tags: [alacritty, config]

- name: Deploy alacritty config
  file.template:
    src: ./alacritty.toml
    dest: ~/.config/alacritty/alacritty.toml
  tags: [alacritty, config]
